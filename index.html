<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#000000">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>TripOS — Dashboard Executivo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=JetBrains+Mono:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
/* ============================================================
   RESET
============================================================ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{height:100%;font-size:16px}
body{font-family:'Syne',sans-serif;background:#000;color:#e2e2ea;min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased}
button{font-family:'Syne',sans-serif;cursor:pointer;border:none;background:none;color:inherit}
input,textarea,select{font-family:'Syne',sans-serif;color-scheme:dark}
a{color:inherit;text-decoration:none}
::-webkit-scrollbar{width:2px;height:2px}
::-webkit-scrollbar-thumb{background:var(--ac);border-radius:4px}
.mono{font-family:'JetBrains Mono',monospace}

/* ============================================================
   CSS VARIABLES — trocadas ao selecionar passageiro
============================================================ */
:root{
  --ac:#e53e3e;
  --ac-h:229,62,62;
  --ac-dim:rgba(229,62,62,0.10);
  --ac-glow:rgba(229,62,62,0.25);
  --ac-border:rgba(229,62,62,0.22);
  --bg:#000;
  --bg1:#080808;
  --bg2:#0f0f0f;
  --bg3:#161616;
  --gl:rgba(255,255,255,0.04);
  --gl2:rgba(255,255,255,0.07);
  --bd:rgba(255,255,255,0.07);
  --tx:#e2e2ea;
  --tx2:#70708a;
  --tx3:#38384e;
  --dock:68px;
}

/* ============================================================
   BACKGROUND
============================================================ */
body::before{
  content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background:
    radial-gradient(ellipse 70% 40% at 50% 0%,rgba(var(--ac-h),0.05) 0%,transparent 65%),
    linear-gradient(rgba(255,255,255,0.010) 1px,transparent 1px),
    linear-gradient(90deg,rgba(255,255,255,0.010) 1px,transparent 1px);
  background-size:100% 100%,44px 44px,44px 44px;
  transition:background 0.5s;
}
body::after{
  content:'';position:fixed;top:-180px;right:-180px;width:480px;height:480px;
  background:radial-gradient(circle,rgba(var(--ac-h),0.08) 0%,transparent 65%);
  pointer-events:none;z-index:0;transition:background 0.5s;
}

/* ============================================================
   LAYOUT
============================================================ */
#wrap{position:relative;z-index:1;display:flex;flex-direction:column;min-height:100vh}
#page{flex:1;padding:14px 14px calc(var(--dock) + 20px);max-width:680px;margin:0 auto;width:100%}

/* ============================================================
   HEADER
============================================================ */
#hdr{
  position:sticky;top:0;z-index:80;
  background:rgba(0,0,0,0.90);
  backdrop-filter:blur(28px) saturate(200%);
  -webkit-backdrop-filter:blur(28px) saturate(200%);
  border-bottom:1px solid var(--bd);
  padding:10px 14px;
  display:flex;align-items:center;gap:10px;
}
.hdr-icon{
  width:32px;height:32px;border-radius:9px;flex-shrink:0;font-size:15px;
  background:var(--ac-dim);border:1px solid var(--ac-border);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 0 14px var(--ac-glow);transition:all .4s;
}
.hdr-info{flex:1;min-width:0}
.hdr-name{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hdr-dest{font-size:10px;color:var(--tx2);margin-top:1px;font-family:'JetBrains Mono',monospace}
.hdr-right{display:flex;flex-direction:column;align-items:flex-end;flex-shrink:0;gap:1px}
.hdr-total-lbl{font-size:8px;color:var(--tx3);text-transform:uppercase;letter-spacing:.1em}
.hdr-total-val{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;color:var(--ac);transition:color .4s}
.hdr-brl{font-family:'JetBrains Mono',monospace;font-size:10px;color:rgba(var(--ac-h),0.6);transition:color .4s}

/* ============================================================
   DOCK
============================================================ */
#dock{
  position:fixed;bottom:0;left:0;right:0;z-index:90;
  height:var(--dock);
  background:rgba(0,0,0,0.94);
  backdrop-filter:blur(36px) saturate(200%);
  -webkit-backdrop-filter:blur(36px) saturate(200%);
  border-top:1px solid var(--bd);
  display:flex;align-items:stretch;
  padding:0 2px;
  padding-bottom:env(safe-area-inset-bottom,0px);
}
.dk{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;
  border-radius:10px;margin:5px 1px;
  transition:all .2s cubic-bezier(.4,0,.2,1);
  color:var(--tx3);font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;
  border:1px solid transparent;
}
.dk svg{transition:all .2s;stroke-width:1.5}
.dk.on{color:var(--ac);background:var(--ac-dim);border-color:var(--ac-border);box-shadow:0 0 12px var(--ac-glow)}
.dk.on svg{filter:drop-shadow(0 0 4px var(--ac))}
.dk:not(.on):active{background:var(--gl);color:var(--tx2)}

/* ============================================================
   CARDS
============================================================ */
.card{
  background:var(--gl);
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  border:1px solid var(--bd);border-radius:14px;overflow:hidden;
}
.card-glow{border-color:var(--ac-border);box-shadow:0 0 22px var(--ac-dim),inset 0 0 22px rgba(var(--ac-h),0.02)}
.ch{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;border-bottom:1px solid var(--bd);gap:8px}
.ch-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--tx2)}
.cb{padding:14px}
.mb8{margin-bottom:8px}.mb12{margin-bottom:12px}.mb16{margin-bottom:16px}

/* ============================================================
   PROGRESS BAR
============================================================ */
.bar{height:3px;background:var(--bg3);border-radius:99px;overflow:hidden}
.bar-fill{height:100%;border-radius:99px;transition:width 1s cubic-bezier(.4,0,.2,1),background .4s}
.bar-fat{height:5px}

/* ============================================================
   KPI GRID
============================================================ */
.kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.kpi{background:var(--gl);border:1px solid var(--bd);border-radius:12px;padding:12px 11px}
.kpi-lbl{font-size:8px;text-transform:uppercase;letter-spacing:.1em;color:var(--tx3);margin-bottom:5px}
.kpi-val{font-family:'JetBrains Mono',monospace;font-size:19px;font-weight:700;line-height:1}
.kpi-brl{font-family:'JetBrains Mono',monospace;font-size:10px;color:#d97706;margin-top:2px}
.kpi-sub{font-size:9px;color:var(--tx3);margin-top:3px}

/* ============================================================
   SEC HEADER
============================================================ */
.sh{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.sh-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--tx2);display:flex;align-items:center;gap:7px}
.sh-title::before{content:'';width:3px;height:12px;background:var(--ac);border-radius:99px;display:block;transition:background .4s}

/* ============================================================
   BUTTONS
============================================================ */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;border-radius:9px;font-weight:700;font-size:11px;cursor:pointer;transition:all .18s;padding:7px 14px}
.btn-ac{background:var(--ac);color:#000;border:1px solid var(--ac);box-shadow:0 0 14px var(--ac-glow)}
.btn-ac:active{filter:brightness(1.15);transform:scale(.97)}
.btn-ghost{background:var(--gl2);border:1px solid var(--bd);color:var(--tx2)}
.btn-ghost:active{background:rgba(255,255,255,0.10);color:var(--tx)}
.btn-sm{padding:5px 11px;font-size:10px;border-radius:7px}
.bico{width:28px;height:28px;border-radius:7px;padding:0;background:var(--gl);border:1px solid var(--bd);color:var(--tx3);display:flex;align-items:center;justify-content:center}
.bico:active{background:var(--gl2);color:var(--tx)}
.bico.del:active{background:rgba(229,62,62,.12);border-color:rgba(229,62,62,.3);color:#e53e3e}

/* ============================================================
   FORMS
============================================================ */
.fl{font-size:9px;text-transform:uppercase;letter-spacing:.1em;color:var(--tx3);display:block;margin-bottom:5px}
.fi{background:var(--gl);border:1px solid var(--bd);border-radius:9px;padding:9px 12px;color:var(--tx);font-size:13px;width:100%;outline:none;transition:.18s;font-family:'Syne',sans-serif}
.fi:focus{border-color:var(--ac);background:var(--ac-dim)}
.fi::placeholder{color:var(--tx3)}
.fg{margin-bottom:11px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px}

/* ============================================================
   CHIPS
============================================================ */
.chip-row{display:flex;flex-wrap:wrap;gap:5px}
.chip{padding:4px 11px;border-radius:99px;font-size:10px;font-weight:700;border:1px solid var(--bd);background:var(--gl);color:var(--tx3);cursor:pointer;transition:.15s}
.chip:active{background:var(--gl2)}
.chip.on{background:var(--ac-dim);border-color:var(--ac-border);color:var(--ac)}

/* ============================================================
   MODAL
============================================================ */
.mbg{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.84);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);display:none;align-items:flex-end;justify-content:center}
@media(min-width:580px){.mbg{align-items:center}}
.mbg.on{display:flex}
.mbox{
  background:linear-gradient(155deg,#0e0e0e,#080808);
  border:1px solid var(--bd);width:100%;max-width:460px;
  max-height:92dvh;overflow-y:auto;
  border-radius:18px 18px 0 0;
  box-shadow:0 -16px 48px rgba(0,0,0,.7),0 0 32px var(--ac-dim);
}
@media(min-width:580px){.mbox{border-radius:18px}}
.mh{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid var(--bd);position:sticky;top:0;background:#0e0e0e;z-index:1}
.mt{font-size:13px;font-weight:700}
.mc{width:26px;height:26px;border-radius:6px;background:var(--gl);border:1px solid var(--bd);color:var(--tx2);display:flex;align-items:center;justify-content:center;font-size:13px;cursor:pointer}
.mc:active{background:rgba(229,62,62,.12);color:#e53e3e}
.mb{padding:16px}

/* ============================================================
   FX BAR (câmbio)
============================================================ */
.fx{
  display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;
  background:rgba(217,119,6,0.06);border:1px solid rgba(217,119,6,0.18);
  border-radius:11px;padding:9px 13px;margin-bottom:12px;
}
.fx-left{display:flex;align-items:center;gap:9px;flex-wrap:wrap}
.fx-icon{font-size:13px;flex-shrink:0}
.fx-info{display:flex;flex-direction:column;gap:1px}
.fx-rate{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:700;color:#d97706;display:flex;align-items:center;gap:6px}
.fx-age{font-size:9px;color:var(--tx3)}
.badge{display:inline-flex;align-items:center;padding:1px 7px;border-radius:99px;font-size:8px;font-weight:700;letter-spacing:.05em}
.b-ok{background:rgba(34,197,94,.1);color:#4ade80;border:1px solid rgba(34,197,94,.22)}
.b-warn{background:rgba(217,119,6,.1);color:#fcd34d;border:1px solid rgba(217,119,6,.22)}
.b-err{background:rgba(229,62,62,.1);color:#fca5a5;border:1px solid rgba(229,62,62,.22)}
.fx-btn{font-size:10px;font-weight:700;padding:5px 10px;border-radius:7px;cursor:pointer;
  background:rgba(217,119,6,0.09);border:1px solid rgba(217,119,6,0.22);color:#d97706;transition:.15s;flex-shrink:0}
.fx-btn:active{background:rgba(217,119,6,0.2)}

/* ============================================================
   DUAL PRICE
============================================================ */
.dp{display:flex;flex-direction:column;align-items:flex-end;gap:1px}
.dp-usd{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700}
.dp-brl{font-family:'JetBrains Mono',monospace;font-size:10px;color:#d97706}
.cell-brl{font-family:'JetBrains Mono',monospace;font-size:9px;color:#d97706;margin-top:1px}

/* ============================================================
   COUNTDOWN
============================================================ */
.hero{
  background:var(--gl);border:1px solid var(--ac-border);border-radius:14px;
  padding:18px 16px;margin-bottom:12px;position:relative;overflow:hidden;
  box-shadow:0 0 24px var(--ac-dim);
}
.hero::after{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse 55% 55% at 100% 0%,var(--ac-dim),transparent);
  pointer-events:none;
}
.hero-dest{font-size:9px;text-transform:uppercase;letter-spacing:.15em;color:var(--ac);margin-bottom:10px;display:flex;align-items:center;gap:7px;position:relative;z-index:1}
.cblocks{display:flex;gap:14px;position:relative;z-index:1}
.cblock{text-align:center}
.cn{font-family:'JetBrains Mono',monospace;font-size:36px;font-weight:700;line-height:1;color:var(--tx)}
.cl{font-size:8px;text-transform:uppercase;letter-spacing:.12em;color:var(--tx3);margin-top:3px}
@media(max-width:360px){.cn{font-size:28px}}

/* ============================================================
   PASSENGER CARD
============================================================ */
.pcard{
  background:var(--gl);border:1px solid var(--bd);border-radius:12px;
  padding:12px;display:flex;align-items:center;gap:10px;margin-bottom:9px;
}
.pav{width:42px;height:42px;border-radius:11px;font-size:20px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;border:2px solid transparent}
.pinfo{flex:1;min-width:0}
.pname{font-size:13px;font-weight:700}
.pbio{font-size:10px;color:var(--tx3);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pact{display:flex;gap:5px;flex-shrink:0}

/* ============================================================
   EMOJI & COLOR PICKERS
============================================================ */
.eg{display:grid;grid-template-columns:repeat(6,1fr);gap:5px;margin-bottom:12px}
.eo{width:100%;aspect-ratio:1;border-radius:8px;font-size:18px;border:1px solid transparent;background:var(--gl);cursor:pointer;transition:.15s;display:flex;align-items:center;justify-content:center}
.eo.on{background:var(--ac-dim);border-color:var(--ac-border);transform:scale(1.06)}
.cr{display:flex;gap:6px;flex-wrap:wrap}
.cd{width:24px;height:24px;border-radius:7px;cursor:pointer;border:2px solid transparent;transition:.15s}
.cd.on{border-color:#fff;transform:scale(1.18);box-shadow:0 0 7px currentColor}

/* ============================================================
   FINANCE
============================================================ */
.frow{padding:11px 13px;border-bottom:1px solid var(--bd);transition:.12s}
.frow:last-child{border-bottom:none}
.frow:active{background:rgba(255,255,255,.015)}
.ftop{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:7px}
.fcells{display:grid;grid-template-columns:1fr 1fr 1fr;gap:5px;margin-top:7px}
.fc{background:var(--bg3);border-radius:7px;padding:6px 7px;text-align:center;transition:.15s}
.fc:active{background:var(--gl2)}
.fc-lbl{font-size:8px;text-transform:uppercase;letter-spacing:.06em;color:var(--tx3);margin-bottom:2px}
.fc-val{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700}
.fc-edit{
  font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;
  background:var(--ac-dim);border:1px solid var(--ac-border);
  border-radius:5px;padding:2px 6px;color:var(--tx);outline:none;
  width:100%;text-align:center;
}

/* ============================================================
   SHOPPING
============================================================ */
.si{padding:11px 13px;border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:9px}
.si:last-child{border-bottom:none}
.sck{width:21px;height:21px;border-radius:50%;border:1.5px solid var(--bd);flex-shrink:0;cursor:pointer;transition:.18s;display:flex;align-items:center;justify-content:center;font-size:10px}
.sck.on{background:var(--ac);border-color:var(--ac);color:#000;box-shadow:0 0 8px var(--ac-glow)}
.si-info{flex:1;min-width:0}
.si-name{font-size:12px;font-weight:600}
.si-name.x{text-decoration:line-through;color:var(--tx3)}
.si-cat{font-size:9px;color:var(--tx3);margin-top:1px;text-transform:uppercase;letter-spacing:.05em}

/* ============================================================
   TICKET / TOGGLE
============================================================ */
.ti{padding:11px 13px;border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:9px}
.ti:last-child{border-bottom:none}
.tsw{width:36px;height:20px;border-radius:99px;border:1.5px solid var(--bd);background:var(--bg3);flex-shrink:0;cursor:pointer;transition:.25s;position:relative}
.tsw::after{content:'';position:absolute;top:2px;left:2px;width:12px;height:12px;border-radius:50%;background:var(--tx3);transition:.25s}
.tsw.on{background:var(--ac-dim);border-color:var(--ac)}
.tsw.on::after{left:18px;background:var(--ac);box-shadow:0 0 5px var(--ac)}
.ti-info{flex:1;min-width:0}
.ti-name{font-size:12px;font-weight:600}
.ti-link{font-size:9px;color:var(--ac);opacity:.7;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ti-st{font-size:8px;margin-top:2px;text-transform:uppercase;letter-spacing:.06em}

/* ============================================================
   DOCS
============================================================ */
.di{display:flex;align-items:center;gap:9px;padding:10px 13px;border-bottom:1px solid var(--bd)}
.di:last-child{border-bottom:none}
.dsw{width:34px;height:18px;border-radius:99px;border:1px solid var(--bd);background:var(--bg3);flex-shrink:0;cursor:pointer;transition:.25s;position:relative}
.dsw::after{content:'';position:absolute;top:2px;left:2px;width:10px;height:10px;border-radius:50%;background:var(--tx3);transition:.25s}
.dsw.on{background:var(--ac-dim);border-color:var(--ac)}
.dsw.on::after{left:18px;background:var(--ac)}
.di-name{flex:1;font-size:12px;font-weight:500}
.di-name.done{color:var(--tx3);text-decoration:line-through}
.udi{width:5px;height:5px;border-radius:50%;background:#e53e3e;flex-shrink:0;box-shadow:0 0 5px #e53e3e}

/* ============================================================
   ITINERARY
============================================================ */
.dc{background:var(--gl);border:1px solid var(--bd);border-radius:12px;overflow:hidden;margin-bottom:10px}
.dch{display:flex;align-items:center;justify-content:space-between;padding:9px 13px;border-bottom:1px solid var(--bd)}
.dnum{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;color:var(--ac);width:24px;height:24px;border-radius:6px;background:var(--ac-dim);border:1px solid var(--ac-border);display:flex;align-items:center;justify-content:center;transition:all .4s}
.per{padding:9px 13px;border-bottom:1px solid var(--bd)}
.per:last-child{border-bottom:none}
.per-l{font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;margin-bottom:6px}
.per-ta{background:var(--bg3);border:1px solid var(--bd);border-radius:7px;padding:7px 10px;color:var(--tx);font-size:12px;width:100%;outline:none;resize:none;transition:.15s;font-family:'Syne',sans-serif}
.per-ta:focus{border-color:var(--ac);background:var(--ac-dim)}
.per-ta::placeholder{color:var(--tx3)}

/* ============================================================
   DESTINATION GRID
============================================================ */
.dg{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin-top:9px}
@media(max-width:380px){.dg{grid-template-columns:repeat(2,1fr)}}
.db{padding:9px 5px;border-radius:10px;border:1px solid var(--bd);background:var(--gl);cursor:pointer;transition:.15s;text-align:center}
.db.on{background:var(--ac-dim);border-color:var(--ac-border)}
.db:active{transform:scale(.97)}
.df{font-size:20px;margin-bottom:3px}
.dn{font-size:10px;font-weight:700}
.dtz{font-size:8px;color:var(--tx3);margin-top:1px;font-family:'JetBrains Mono',monospace}

/* ============================================================
   CONS BANNER
============================================================ */
.cons{
  background:var(--gl);border:1px solid var(--bd);border-radius:10px;
  padding:9px 12px;margin-bottom:12px;display:flex;flex-wrap:wrap;gap:10px;align-items:center;
}
.ci{font-size:10px;color:var(--tx2)}
.ci b{font-family:'JetBrains Mono',monospace;color:var(--tx)}
.ci .brl{color:#d97706;font-size:9px}

/* ============================================================
   TOTALS FOOTER
============================================================ */
.tf{padding:11px 13px;background:rgba(255,255,255,.02);border-top:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:7px}
.tr{display:flex;justify-content:space-between;font-size:10px;padding:2px 0}

/* ============================================================
   CAT SCROLL
============================================================ */
.csc{display:flex;gap:5px;overflow-x:auto;padding-bottom:2px;margin-bottom:11px}
.csc::-webkit-scrollbar{height:0}

/* ============================================================
   ALERTS & EMPTY
============================================================ */
.ua{background:rgba(229,62,62,.06);border:1px solid rgba(229,62,62,.18);border-radius:10px;padding:10px 12px;margin-bottom:12px}

/* ============================================================
   LOAD / SAVE — localStorage com auto-save em TODA mudanca
============================================================ */
var LS_KEY = 'tripos_v5';

function loadState(){
  try{
    var raw = localStorage.getItem(LS_KEY);
    if(raw){
      var parsed = JSON.parse(raw);
      // garante estrutura minima
      if(!parsed.passengers||!parsed.trip) throw new Error('bad');
      return parsed;
    }
  }catch(e){}

}

function save(){
  try{
    localStorage.setItem(LS_KEY, JSON.stringify(S));

}

var toastTimer;

  var t = document.getElementById('toast');
  if(!t) return;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(function(){ t.classList.remove('show'); }, 1600);
}

var S = loadState();

// Garantir que cores sejam objetos ACCENTS
function fixColors(){
  S.passengers = S.passengers.map(function(p){
    if(!p.color || typeof p.color !== 'object' || !p.color.hex){
      var found = ACCENTS.find(function(a){ return a.hex === p.color; }) || ACCENTS[0];
      return Object.assign({}, p, {color: found});
    }
    return p;
  });
}

/* ============================================================
   FX ENGINE — cotacao USD/BRL com cache 24h
============================================================ */
var FX_KEY = 'tripos_fx_v3';
var FX_TTL = 86400000; // 24 horas
var FX = { rate: null, ts: 0, status: 'init' };
// status: init | loading | fresh | stale | error

function fxLoad(){
  try{
    var d = JSON.parse(localStorage.getItem(FX_KEY)||'{}');
    if(d.rate && d.ts){
      FX.rate = parseFloat(d.rate);
      FX.ts   = d.ts;
      FX.status = (Date.now() - FX.ts < FX_TTL) ? 'fresh' : 'stale';
    }
  }catch(e){}
}

function fxSave(){
  try{ localStorage.setItem(FX_KEY, JSON.stringify({rate:FX.rate,ts:FX.ts})); }catch(e){}
}

// Lista de APIs com CORS aberto — testadas para funcionar no GitHub Pages
// Cada entrada: [url, fn_extratora(data) -> numero]
var FX_APIS = [
  // 1. AwesomeAPI — brasileira, CORS aberto, sem chave
  [
    'https://economia.awesomeapi.com.br/json/last/USD-BRL',
    function(d){ return parseFloat(d.USDBRL.bid); }
  ],
  // 2. Fawazahmed0 via jsDelivr CDN — sempre CORS aberto
  [
    'https://cdn.jsdelivr.net/npm/@fawazahmed0/currency-api@latest/v1/currencies/usd.json',
    function(d){ return parseFloat(d.usd.brl); }
  ],
  // 3. Open.er-api — CORS aberto
  [
    'https://open.er-api.com/v6/latest/USD',
    function(d){ return parseFloat(d.rates.BRL); }
  ],
  // 4. Frankfurter (Banco Central Europeu) — CORS aberto
  [
    'https://api.frankfurter.app/latest?from=USD&to=BRL',
    function(d){ return parseFloat(d.rates.BRL); }
  ],
];

async function fxFetch(force){
  if(!force && FX.rate && FX.status === 'fresh') return;
  FX.status = 'loading';
  fxRender();

  var success = false;
  for(var i = 0; i < FX_APIS.length; i++){
    var api = FX_APIS[i];
    try{
      var resp = await fetch(api[0], {cache:'no-store'});
      if(!resp.ok) throw new Error('HTTP '+resp.status);
      var data = await resp.json();
      var rate = api[1](data);
      if(!rate || isNaN(rate) || rate < 1) throw new Error('taxa invalida: '+rate);
      FX.rate   = rate;
      FX.ts     = Date.now();
      FX.status = 'fresh';
      FX.source = api[0].replace('https://','').split('/')[0]; // dominio da fonte
      fxSave();
      success = true;
      break; // funcionou, para de tentar
    }catch(e){
      // tenta proxima API
    }
  }

  if(!success){
    // Todas falharam — usa cache se existir, senão erro
    FX.status = FX.rate ? 'stale' : 'error';
    // SEM fallback fixo — usuario vê ERRO e sabe que esta desconectado
  }

  fxRender();
  updateHdr();
  renderPage();
}

function fxRender(){
  var rateStr = FX.rate ? 'R $ '+Number(FX.rate).toFixed(4) : (FX.status==='error'?'Sem conexao':'Carregando...');
  var ageMs   = FX.ts ? Date.now() - FX.ts : null;
  var ageStr  = ageMs !== null ? (ageMs < 60000 ? 'agora' : ageMs < 3600000 ? Math.round(ageMs/60000)+'min atras' : Math.round(ageMs/3600000)+'h atras') : '';
  var tsFmt   = FX.ts ? new Date(FX.ts).toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'}) : '';
  var src     = FX.source ? ' · '+FX.source : '';
  var subLine = tsFmt ? 'USD/BRL · '+tsFmt+(ageStr?' ('+ageStr+')':'')+src : 'Toque em Atualizar para buscar a cotacao';
  var badge = {
    fresh:  '<span class="badge b-ok">ATUALIZADO</span>',
    stale:  '<span class="badge b-warn">CACHE</span>',
    error:  '<span class="badge b-err">SEM CONEXAO</span>',
    loading:'<span class="badge b-warn">BUSCANDO...</span>',
    init:   '<span class="badge b-warn">AGUARDANDO</span>'
  }[FX.status]||'';
  document.querySelectorAll('.fx-rate-el').forEach(function(el){ el.textContent = rateStr; });
  document.querySelectorAll('.fx-badge-el').forEach(function(el){ el.innerHTML = badge; });
  document.querySelectorAll('.fx-age-el').forEach(function(el){ el.textContent = subLine; });
}

function brl(usd){
  if(!FX.rate || !usd) return null;
  return usd * FX.rate;
}

function fmtBRL(usd){
  var b = brl(usd);
  if(b===null) return '';
  return 'R$'+b.toFixed(2);
}

function fxBar(){
  var rateStr = FX.rate ? 'R$ '+Number(FX.rate).toFixed(4) : (FX.status==='error'?'Sem conexao':'Carregando...');
  var tsFmt   = FX.ts ? new Date(FX.ts).toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'}) : '';
  var ageMs   = FX.ts ? Date.now()-FX.ts : null;
  var ageStr  = ageMs!==null ? (ageMs<60000?'agora':ageMs<3600000?Math.round(ageMs/60000)+'min':Math.round(ageMs/3600000)+'h')+' atras' : '';
  var src     = FX.source ? ' · '+FX.source : '';
  var subLine = tsFmt ? 'USD/BRL · '+tsFmt+(ageStr?' ('+ageStr+')':'')+src : 'Toque Atualizar para buscar';
  var badgeMap = {fresh:'b-ok">ATUALIZADO',stale:'b-warn">CACHE',error:'b-err">SEM CONEXAO',loading:'b-warn">BUSCANDO...',init:'b-warn">AGUARDANDO'};
  var bc = badgeMap[FX.status]||'b-warn">—';
  var badge = '<span class="badge '+bc+'</span>';
  return '<div class="fx">'
    +'<div class="fx-left"><span class="fx-icon">💱</span>'
    +'<div class="fx-info">'
    +'<div class="fx-rate"><span class="fx-rate-el">'+rateStr+'</span><span class="fx-badge-el">'+badge+'</span></div>'
    +'<div class="fx-age fx-age-el">'+subLine+'</div>'
    +'</div></div>'
    +'<button class="fx-btn" onclick="fxFetch(true)">↻ Atualizar</button>'
    +'</div>';
}

function dprice(usd){
  var b = brl(usd);
  return '<div class="dp"><span class="dp-usd">$'+Number(usd).toFixed(2)+'</span>'+(b!==null?'<span class="dp-brl">R$'+b.toFixed(2)+'</span>':'')+'</div>';
}

/* ============================================================
   FORMAT HELPERS
============================================================ */
function sym(){ return SYMS[S.trip.currency]||'$'; }
function fmt(n){ return (SYMS[S.trip.currency]||'$')+Number(n||0).toFixed(2); }
function pct(a,b){ return b>0?Math.min(100,Math.round(a/b*100)):0; }
function bar(v,m,c,fat){
  return '<div class="bar'+(fat?' bar-fat':'')+'"><div class="bar-fill" style="width:'+pct(v,m)+'%;background:'+(c||acHex())+'"></div></div>';
}

/* ============================================================
   ACCENT — aplicado instantaneamente ao trocar passageiro
============================================================ */
function acHex(){ var ap=getAP(); return ap&&ap.color&&ap.color.hex ? ap.color.hex : '#e53e3e'; }
function acH(){   var ap=getAP(); return ap&&ap.color&&ap.color.h   ? ap.color.h   : '229,62,62'; }

function applyAccent(){
  var h=acHex(), rgb=acH(), r=document.documentElement;
  r.style.setProperty('--ac', h);
  r.style.setProperty('--ac-h', rgb);
  r.style.setProperty('--ac-dim',    'rgba('+rgb+',0.10)');
  r.style.setProperty('--ac-glow',   'rgba('+rgb+',0.25)');
  r.style.setProperty('--ac-border', 'rgba('+rgb+',0.22)');
}

/* ============================================================
   GETTERS
============================================================ */
function getAP(){ return S.passengers.find(function(p){ return p.id===S.pid; })||S.passengers[0]; }
function pFin(){  var k=String(S.pid); return S.finances[k]||[]; }
function pShop(){ var k=String(S.pid); return S.shopping[k]||[]; }
function pTix(){  var k=String(S.pid); return S.tickets[k]||[]; }

function globalTotalUSD(){
  var fT = Object.values(S.finances).flat().reduce(function(a,f){return a+f.target;},0);
  var tx = S.trip.tax||TAX_DEF;
  var sT = Object.values(S.shopping).flat().reduce(function(a,i){return a+i.usd*(1+tx);},0);
  var tT = Object.values(S.tickets).flat().reduce(function(a,t){return a+t.value;},0);
  return fT+sT+tT;
}

/* ============================================================
   HEADER
============================================================ */
function updateHdr(){
  applyAccent();
  var ap=getAP();
  var icon=document.getElementById('hdr-icon');
  var name=document.getElementById('hdr-name');
  var dest=document.getElementById('hdr-dest');
  var usdEl=document.getElementById('hdr-usd');
  var brlEl=document.getElementById('hdr-brl');
  if(icon){ icon.textContent=ap?ap.emoji:'✈'; icon.style.background='rgba('+acH()+',0.10)'; icon.style.borderColor='rgba('+acH()+',0.22)'; icon.style.boxShadow='0 0 14px rgba('+acH()+',0.25)'; }
  if(name) name.textContent=TAB_NAMES[S.tab]||'TripOS';
  if(dest) dest.textContent=S.trip.flag+' '+S.trip.dest+' · '+new Date(S.trip.date).toLocaleDateString('pt-BR');
  var tot=globalTotalUSD();
  if(usdEl) usdEl.textContent=fmt(tot);
  if(brlEl){ var b=brl(tot); brlEl.textContent=b?'R$'+b.toFixed(2):'R$—'; }
}

/* ============================================================
   NAVIGATION
============================================================ */
function go(tab){
  S.tab=tab;
  document.querySelectorAll('.dk').forEach(function(b){ b.classList.toggle('on', b.dataset.tab===tab); });
  updateHdr();
  renderPage();
}

function OM(id){ document.getElementById(id).classList.add('on'); }
function CM(id){ document.getElementById(id).classList.remove('on'); }

/* ============================================================
   COUNTDOWN
============================================================ */
var cdInt;
function getCD(){
  // Parsear como horario LOCAL (evita bug de fuso UTC-3 no Brasil)
  var parts = S.trip.date.split('-');
  var target = new Date(+parts[0], +parts[1]-1, +parts[2], 0, 0, 0);
  var ms = target - new Date();
  if(ms<=0)return{d:0,h:0,m:0,s:0};
  return{d:Math.floor(ms/86400000),h:Math.floor((ms%86400000)/3600000),m:Math.floor((ms%3600000)/60000),s:Math.floor((ms%60000)/1000)};
}
function tickCD(){
  var c=getCD();
  ['d','h','m','s'].forEach(function(k){
    var el=document.getElementById('cd-'+k);
    if(el) el.textContent=String(c[k]).padStart(2,'0');
  });
}
function startCD(){ clearInterval(cdInt); cdInt=setInterval(tickCD,1000); tickCD(); }

/* ============================================================
   RENDER ENGINE
============================================================ */
function renderPage(){
  var pg=document.getElementById('page');
  if(!pg)return;
  var d=document.createElement('div');
  d.className='ai';
  switch(S.tab){
    case'dash': d.innerHTML=rDash();  break;
    case'fin':  d.innerHTML=rFin();   break;
    case'rot':  d.innerHTML=rRot();   break;
    case'shop': d.innerHTML=rShop();  break;
    case'tix':  d.innerHTML=rTix();   break;
    case'cfg':  d.innerHTML=rCfg();   break;
  }
  pg.innerHTML='';
  pg.appendChild(d);
}

  var totT=rows.reduce(function(a,r){return a+r.target;},0);
  var totS=rows.reduce(function(a,r){return a+r.saved;},0);
  var allF=Object.values(S.finances).flat();
  var cT=allF.reduce(function(a,f){return a+f.target;},0);
  var cS=allF.reduce(function(a,f){return a+f.saved;},0);

  h+='<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="var(--tx3)" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>';
  h+='<span class="ci">Meta Total: <b>$'+Number(cT).toFixed(0)+(bT?' <span class="brl">/ R$'+bT.toFixed(0)+'</span>':'')+'</b></span>';
  h+='<span class="ci">Guardado: <b style="color:#22c55e">$'+Number(cS).toFixed(0)+(bS?' <span class="brl">/ R$'+bS.toFixed(0)+'</span>':'')+'</b></span>';

  h+='</div>';
  h+='<div class="card">';

  h+='<div><div class="ch-title">'+ap.name+'</div><div style="font-size:9px;color:var(--tx3)">'+rows.length+' metas</div></div></div>';

      // Alvo — editavel ao toque
      h+='<div class="fc" onclick="editFinVal('+r.id+',\'target\')" style="cursor:pointer" title="Toque para editar">';

      var bV=brl(t.value);
      h+='<div class="ti"><div class="tsw '+(t.bought?'on':'')+'" onclick="togTix('+t.id+')"></div>';
      h+='<div class="ti-info"><div class="ti-name" style="'+(t.bought?'color:var(--tx3);text-decoration:line-through':'')+'">'+(t.event)+'</div>';
      if(t.link) h+='<a href="'+t.link+'" target="_blank" class="ti-link">'+t.link+'</a>';
      h+='<div class="ti-st" style="color:'+(t.bought?'#22c55e':'var(--tx3)')+'">'+(t.bought?'✓ Comprado':'Pendente')+'</div></div>';
      h+='<div class="dp"><span class="dp-usd">$'+t.value.toFixed(2)+'</span>'+(bV?'<span class="dp-brl">R$'+bV.toFixed(0)+'</span>':'')+'</div>';
      h+='<button class="bico del" onclick="delTix('+t.id+')"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/></svg></button></div>';
    });
    h+='<div class="tf"><span style="font-size:9px;color:var(--tx3)">'+bought+'/'+items.length+' confirmados</span>';
    h+='<div class="dp"><span class="dp-usd">$'+totT.toFixed(2)+'</span>'+(bTotT?'<span class="dp-brl">R$'+bTotT.toFixed(0)+'</span>':'')+'</div></div>';
  }
  h+='</div>';
  // DOCS
  h+='<div class="card"><div class="ch">';
  h+='<div><div class="ch-title">📋 Documentos</div><div style="font-size:9px;color:var(--tx3);margin-top:2px">'+docsDone+'/'+S.docs.length+' concluidos</div></div>';
  h+='<button class="btn btn-ac btn-sm" onclick="OM(\'m-doc\')">+ Doc</button></div>';
  h+='<div style="padding:5px 13px 7px">'+bar(docsDone,S.docs.length,'#22c55e')+'</div>';
  S.docs.forEach(function(d){
    h+='<div class="di"><div class="dsw '+(d.checked?'on':'')+'" onclick="togDoc('+d.id+')"></div>';
    h+='<div class="di-name '+(d.checked?'done':'')+'">'+d.name+'</div>';
    if(d.urgent&&!d.checked) h+='<div class="udi"></div>';
    if(d.urgent) h+='<span class="badge badge-ac" style="font-size:8px">URG</span>';
    h+='<button class="bico del" onclick="delDoc('+d.id+')"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/></svg></button></div>';
  });
  h+='</div>';
  return h;
}

    h+='<span style="font-size:8px;color:var(--tx3);font-family:monospace">'+col+'</span>';
    if(S.pid===p.id) h+='<span class="badge badge-ac">Ativo</span>';
    h+='</div></div>';
    h+='<div class="pact">';

    h+='<button class="bico" onclick="openEditPax('+p.id+')"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button>';

/* ============================================================
   PASSENGER CRUD
============================================================ */
function buildPaxModal(){
  var pf=S.pf;
  document.getElementById('em-grid').innerHTML=EMOJIS.map(function(e){
    return '<button class="eo '+(pf.emoji===e?'on':'')+'" onclick="selEmoji(\''+e+'\')">'+e+'</button>';
  }).join('');
  document.getElementById('col-row').innerHTML=ACCENTS.map(function(a){
    return '<div class="cd '+(pf.color&&pf.color.hex===a.hex?'on':'')+'" style="background:'+a.hex+'" onclick="selColor(\''+a.hex+'\',\''+a.h+'\')"></div>';
  }).join('');
}
function selEmoji(e){
  S.pf.emoji=e;
  document.querySelectorAll('.eo').forEach(function(el){ el.classList.toggle('on',el.textContent.trim()===e); });
}
function selColor(hex,h){
  S.pf.color={hex:hex,h:h};
  document.querySelectorAll('.cd').forEach(function(el){ el.classList.toggle('on',el.style.background===hex||el.style.backgroundColor===hex); });
}
function openNewPax(){
  S.editPid=null; S.pf={emoji:'🧑',color:ACCENTS[0],name:'',bio:''};
  document.getElementById('pax-m-title').textContent='Novo Passageiro';
  document.getElementById('pax-save-btn').textContent='Adicionar';
  document.getElementById('pax-name').value='';
  document.getElementById('pax-bio').value='';
  buildPaxModal(); OM('m-pax');
}
function openEditPax(id){
  var p=S.passengers.find(function(x){return x.id===id;}); if(!p) return;
  S.editPid=id; S.pf={emoji:p.emoji,color:p.color,name:p.name,bio:p.bio||''};
  document.getElementById('pax-m-title').textContent='Editar Perfil';
  document.getElementById('pax-save-btn').textContent='Salvar';
  document.getElementById('pax-name').value=p.name;
  document.getElementById('pax-bio').value=p.bio||'';
  buildPaxModal(); OM('m-pax');
}
function savePax(){
  var name=document.getElementById('pax-name').value.trim();
  var bio =document.getElementById('pax-bio').value.trim();
  if(!name){alert('Digite um nome.');return;}
  if(S.editPid){
    S.passengers=S.passengers.map(function(p){
      return p.id===S.editPid?Object.assign({},p,{name:name,bio:bio,emoji:S.pf.emoji,color:S.pf.color}):p;
    });
  } else {
    var id=MK();
    S.passengers.push({id:id,name:name,bio:bio,emoji:S.pf.emoji,color:S.pf.color});
    S.finances[String(id)]=[];S.shopping[String(id)]=[];S.tickets[String(id)]=[];
  }
  save(); CM('m-pax'); applyAccent(); renderPage();
}
function delPax(id){
  if(S.passengers.length<=1){alert('Minimo 1 passageiro.');return;}
  if(!confirm('Remover passageiro e todos os seus dados?'))return;
  S.passengers=S.passengers.filter(function(p){return p.id!==id;});
  delete S.finances[String(id)]; delete S.shopping[String(id)]; delete S.tickets[String(id)];
  if(S.pid===id) S.pid=S.passengers[0].id;
  save(); applyAccent(); renderPage();
}
function selPax(id){
  S.pid=id; save(); applyAccent(); updateHdr(); renderPage();
}

/* ============================================================
   FINANCE CRUD
============================================================ */
function editFinVal(id, field){
  // Abre um input inline na celula para editar target ou saved
  var elId = field==='target' ? 'fv-t-'+id : 'fv-s-'+id;
  var el = document.getElementById(elId);
  if(!el) return;
  var k = String(S.pid);
  var row = (S.finances[k]||[]).find(function(r){return r.id===id;});
  if(!row) return;
  var curVal = row[field];
  // Cria input
  var inp = document.createElement('input');
  inp.type = 'number';
  inp.step = '0.01';
  inp.value = curVal;
  inp.className = 'fc-edit';
  inp.onclick = function(e){ e.stopPropagation(); };
  function commit(){
    var v = parseFloat(inp.value);
    if(!isNaN(v) && v >= 0){
      S.finances[k] = S.finances[k].map(function(r){
        return r.id===id ? Object.assign({},r,{[field]:v}) : r;
      });
      save();
      renderPage();
    }
  }
  inp.onblur = commit;
  inp.onkeydown = function(e){
    if(e.key==='Enter'){ inp.blur(); }
    if(e.key==='Escape'){ renderPage(); }
  };
  el.parentNode.replaceChild(inp, el);
  inp.focus();
  inp.select();
}

function openFinModal(){
  document.getElementById('fi-item').value='';
  document.getElementById('fi-tgt').value='';
  document.getElementById('fi-svd').value='';
  document.getElementById('fi-chips').innerHTML=FIN_CATS.map(function(c){
    return '<span class="chip '+(S.fcat===c?'on':'')+'" onclick="S.fcat=\''+c+'\';document.querySelectorAll(\'#fi-chips .chip\').forEach(function(el){el.classList.toggle(\'on\',el.textContent===\''+c+'\')})">'+c+'</span>';
  }).join('');
  OM('m-fin');
}
function saveFin(){
  var item=document.getElementById('fi-item').value.trim();
  var tgt=parseFloat(document.getElementById('fi-tgt').value)||0;
  var svd=parseFloat(document.getElementById('fi-svd').value)||0;
  if(!item){alert('Digite o item.');return;}
  var k=String(S.pid);
  if(!S.finances[k]) S.finances[k]=[];
  S.finances[k].push({id:MK(),item:item,target:tgt,saved:svd,category:S.fcat});
  save(); CM('m-fin'); renderPage();
}
function delFin(id){
  var k=String(S.pid);
  S.finances[k]=S.finances[k].filter(function(r){return r.id!==id;});
  save(); renderPage();
}

   ITINERARY CRUD
============================================================ */
function addDay(){
  var days=Object.keys(S.itinerary).map(Number);
  var next=days.length?Math.max.apply(null,days)+1:1;
  S.itinerary[String(next)]={morning:'',afternoon:'',evening:''};
  save(); renderPage();
}
function delDay(d){
  delete S.itinerary[String(d)]; save(); renderPage();
}
function updRot(day,per,val){
  var k=String(day);
  if(!S.itinerary[k]) S.itinerary[k]={};
  S.itinerary[k][per]=val; save();
}

   DOC CRUD
============================================================ */
function saveDoc(){
  var name=document.getElementById('do-name').value.trim();
  var urg=document.getElementById('do-urg').checked;
  if(!name){alert('Digite o nome.');return;}
  S.docs.push({id:MK(),name:name,checked:false,urgent:urg});
  document.getElementById('do-name').value='';

  save(); CM('m-doc'); renderPage();

function delDoc(id){
  S.docs=S.docs.filter(function(d){return d.id!==id;});
  save(); renderPage();
}

   DESTINATION PRESET
============================================================ */
function setDest(d){
  S.trip.dest=d.name; S.trip.country=d.country;
  S.trip.flag=d.flag; S.trip.tax=d.tax||TAX_DEF;
  save(); startCD(); renderPage();
}

/* ============================================================
   INIT — ordem importa
============================================================ */
function init(){
  fixColors();                          // garantir objetos de cor
  fxLoad();                             // carregar cache do dólar
  applyAccent();                        // aplicar cor do passageiro ativo
  // sync dock
  document.querySelectorAll('.dk').forEach(function(b){ b.classList.toggle('on', b.dataset.tab===S.tab); });
  updateHdr();
  renderPage();
  startCD();
  // busca cotação (async — não bloqueia)
  fxFetch(false);
  // re-verifica a cada hora (app aberto longo tempo)
  setInterval(function(){ fxFetch(false); }, 3600000);
}

init();
