<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#000000">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>TripOS — Dashboard Executivo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=JetBrains+Mono:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
/* ============================================================
   RESET
============================================================ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{height:100%;font-size:16px}
body{font-family:'Syne',sans-serif;background:#000;color:#e2e2ea;min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased}
button{font-family:'Syne',sans-serif;cursor:pointer;border:none;background:none;color:inherit}
input,textarea,select{font-family:'Syne',sans-serif;color-scheme:dark}
a{color:inherit;text-decoration:none}
::-webkit-scrollbar{width:2px;height:2px}
::-webkit-scrollbar-thumb{background:var(--ac);border-radius:4px}
.mono{font-family:'JetBrains Mono',monospace}

/* ============================================================
   CSS VARIABLES — trocadas ao selecionar passageiro
============================================================ */
:root{
  --ac:#e53e3e;
  --ac-h:229,62,62;
  --ac-dim:rgba(229,62,62,0.10);
  --ac-glow:rgba(229,62,62,0.25);
  --ac-border:rgba(229,62,62,0.22);
  --bg:#000;
  --bg1:#080808;
  --bg2:#0f0f0f;
  --bg3:#161616;
  --gl:rgba(255,255,255,0.04);
  --gl2:rgba(255,255,255,0.07);
  --bd:rgba(255,255,255,0.07);
  --tx:#e2e2ea;
  --tx2:#70708a;
  --tx3:#38384e;
  --dock:68px;
}

/* ============================================================
   BACKGROUND
============================================================ */
body::before{
  content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background:
    radial-gradient(ellipse 70% 40% at 50% 0%,rgba(var(--ac-h),0.05) 0%,transparent 65%),
    linear-gradient(rgba(255,255,255,0.010) 1px,transparent 1px),
    linear-gradient(90deg,rgba(255,255,255,0.010) 1px,transparent 1px);
  background-size:100% 100%,44px 44px,44px 44px;
  transition:background 0.5s;
}
body::after{
  content:'';position:fixed;top:-180px;right:-180px;width:480px;height:480px;
  background:radial-gradient(circle,rgba(var(--ac-h),0.08) 0%,transparent 65%);
  pointer-events:none;z-index:0;transition:background 0.5s;
}

/* ============================================================
   LAYOUT
============================================================ */
#wrap{position:relative;z-index:1;display:flex;flex-direction:column;min-height:100vh}
#page{flex:1;padding:14px 14px calc(var(--dock) + 20px);max-width:680px;margin:0 auto;width:100%}

/* ============================================================
   HEADER
============================================================ */
#hdr{
  position:sticky;top:0;z-index:80;
  background:rgba(0,0,0,0.90);
  backdrop-filter:blur(28px) saturate(200%);
  -webkit-backdrop-filter:blur(28px) saturate(200%);
  border-bottom:1px solid var(--bd);
  padding:10px 14px;
  display:flex;align-items:center;gap:10px;
}
.hdr-icon{
  width:32px;height:32px;border-radius:9px;flex-shrink:0;font-size:15px;
  background:var(--ac-dim);border:1px solid var(--ac-border);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 0 14px var(--ac-glow);transition:all .4s;
}
.hdr-info{flex:1;min-width:0}
.hdr-name{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hdr-dest{font-size:10px;color:var(--tx2);margin-top:1px;font-family:'JetBrains Mono',monospace}
.hdr-right{display:flex;flex-direction:column;align-items:flex-end;flex-shrink:0;gap:1px}
.hdr-total-lbl{font-size:8px;color:var(--tx3);text-transform:uppercase;letter-spacing:.1em}
.hdr-total-val{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;color:var(--ac);transition:color .4s}
.hdr-brl{font-family:'JetBrains Mono',monospace;font-size:10px;color:rgba(var(--ac-h),0.6);transition:color .4s}

/* ============================================================
   DOCK
============================================================ */
#dock{
  position:fixed;bottom:0;left:0;right:0;z-index:90;
  height:var(--dock);
  background:rgba(0,0,0,0.94);
  backdrop-filter:blur(36px) saturate(200%);
  -webkit-backdrop-filter:blur(36px) saturate(200%);
  border-top:1px solid var(--bd);
  display:flex;align-items:stretch;
  padding:0 2px;
  padding-bottom:env(safe-area-inset-bottom,0px);
}
.dk{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;
  border-radius:10px;margin:5px 1px;
  transition:all .2s cubic-bezier(.4,0,.2,1);
  color:var(--tx3);font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;
  border:1px solid transparent;
}
.dk svg{transition:all .2s;stroke-width:1.5}
.dk.on{color:var(--ac);background:var(--ac-dim);border-color:var(--ac-border);box-shadow:0 0 12px var(--ac-glow)}
.dk.on svg{filter:drop-shadow(0 0 4px var(--ac))}
.dk:not(.on):active{background:var(--gl);color:var(--tx2)}

/* ============================================================
   CARDS
============================================================ */
.card{
  background:var(--gl);
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  border:1px solid var(--bd);border-radius:14px;overflow:hidden;
}
.card-glow{border-color:var(--ac-border);box-shadow:0 0 22px var(--ac-dim),inset 0 0 22px rgba(var(--ac-h),0.02)}
.ch{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;border-bottom:1px solid var(--bd);gap:8px}
.ch-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--tx2)}
.cb{padding:14px}
.mb8{margin-bottom:8px}.mb12{margin-bottom:12px}.mb16{margin-bottom:16px}

/* ============================================================
   PROGRESS BAR
============================================================ */
.bar{height:3px;background:var(--bg3);border-radius:99px;overflow:hidden}
.bar-fill{height:100%;border-radius:99px;transition:width 1s cubic-bezier(.4,0,.2,1),background .4s}
.bar-fat{height:5px}

/* ============================================================
   KPI GRID
============================================================ */
.kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.kpi{background:var(--gl);border:1px solid var(--bd);border-radius:12px;padding:12px 11px}
.kpi-lbl{font-size:8px;text-transform:uppercase;letter-spacing:.1em;color:var(--tx3);margin-bottom:5px}
.kpi-val{font-family:'JetBrains Mono',monospace;font-size:19px;font-weight:700;line-height:1}
.kpi-brl{font-family:'JetBrains Mono',monospace;font-size:10px;color:#d97706;margin-top:2px}
.kpi-sub{font-size:9px;color:var(--tx3);margin-top:3px}

/* ============================================================
   SEC HEADER
============================================================ */
.sh{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.sh-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--tx2);display:flex;align-items:center;gap:7px}
.sh-title::before{content:'';width:3px;height:12px;background:var(--ac);border-radius:99px;display:block;transition:background .4s}

/* ============================================================
   BUTTONS
============================================================ */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;border-radius:9px;font-weight:700;font-size:11px;cursor:pointer;transition:all .18s;padding:7px 14px}
.btn-ac{background:var(--ac);color:#000;border:1px solid var(--ac);box-shadow:0 0 14px var(--ac-glow)}
.btn-ac:active{filter:brightness(1.15);transform:scale(.97)}
.btn-ghost{background:var(--gl2);border:1px solid var(--bd);color:var(--tx2)}
.btn-ghost:active{background:rgba(255,255,255,0.10);color:var(--tx)}
.btn-sm{padding:5px 11px;font-size:10px;border-radius:7px}
.bico{width:28px;height:28px;border-radius:7px;padding:0;background:var(--gl);border:1px solid var(--bd);color:var(--tx3);display:flex;align-items:center;justify-content:center}
.bico:active{background:var(--gl2);color:var(--tx)}
.bico.del:active{background:rgba(229,62,62,.12);border-color:rgba(229,62,62,.3);color:#e53e3e}

/* ============================================================
   FORMS
============================================================ */
.fl{font-size:9px;text-transform:uppercase;letter-spacing:.1em;color:var(--tx3);display:block;margin-bottom:5px}
.fi{background:var(--gl);border:1px solid var(--bd);border-radius:9px;padding:9px 12px;color:var(--tx);font-size:13px;width:100%;outline:none;transition:.18s;font-family:'Syne',sans-serif}
.fi:focus{border-color:var(--ac);background:var(--ac-dim)}
.fi::placeholder{color:var(--tx3)}
.fg{margin-bottom:11px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px}

/* ============================================================
   CHIPS
============================================================ */
.chip-row{display:flex;flex-wrap:wrap;gap:5px}
.chip{padding:4px 11px;border-radius:99px;font-size:10px;font-weight:700;border:1px solid var(--bd);background:var(--gl);color:var(--tx3);cursor:pointer;transition:.15s}
.chip:active{background:var(--gl2)}
.chip.on{background:var(--ac-dim);border-color:var(--ac-border);color:var(--ac)}

/* ============================================================
   MODAL
============================================================ */
.mbg{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.84);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);display:none;align-items:flex-end;justify-content:center}
@media(min-width:580px){.mbg{align-items:center}}
.mbg.on{display:flex}
.mbox{
  background:linear-gradient(155deg,#0e0e0e,#080808);
  border:1px solid var(--bd);width:100%;max-width:460px;
  max-height:92dvh;overflow-y:auto;
  border-radius:18px 18px 0 0;
  box-shadow:0 -16px 48px rgba(0,0,0,.7),0 0 32px var(--ac-dim);
}
@media(min-width:580px){.mbox{border-radius:18px}}
.mh{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid var(--bd);position:sticky;top:0;background:#0e0e0e;z-index:1}
.mt{font-size:13px;font-weight:700}
.mc{width:26px;height:26px;border-radius:6px;background:var(--gl);border:1px solid var(--bd);color:var(--tx2);display:flex;align-items:center;justify-content:center;font-size:13px;cursor:pointer}
.mc:active{background:rgba(229,62,62,.12);color:#e53e3e}
.mb{padding:16px}

/* ============================================================
   FX BAR (câmbio)
============================================================ */
.fx{
  display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;
  background:rgba(217,119,6,0.06);border:1px solid rgba(217,119,6,0.18);
  border-radius:11px;padding:9px 13px;margin-bottom:12px;
}
.fx-left{display:flex;align-items:center;gap:9px;flex-wrap:wrap}
.fx-icon{font-size:13px;flex-shrink:0}
.fx-info{display:flex;flex-direction:column;gap:1px}
.fx-rate{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:700;color:#d97706;display:flex;align-items:center;gap:6px}
.fx-age{font-size:9px;color:var(--tx3)}
.badge{display:inline-flex;align-items:center;padding:1px 7px;border-radius:99px;font-size:8px;font-weight:700;letter-spacing:.05em}
.b-ok{background:rgba(34,197,94,.1);color:#4ade80;border:1px solid rgba(34,197,94,.22)}
.b-warn{background:rgba(217,119,6,.1);color:#fcd34d;border:1px solid rgba(217,119,6,.22)}
.b-err{background:rgba(229,62,62,.1);color:#fca5a5;border:1px solid rgba(229,62,62,.22)}
.fx-btn{font-size:10px;font-weight:700;padding:5px 10px;border-radius:7px;cursor:pointer;
  background:rgba(217,119,6,0.09);border:1px solid rgba(217,119,6,0.22);color:#d97706;transition:.15s;flex-shrink:0}
.fx-btn:active{background:rgba(217,119,6,0.2)}

/* ============================================================
   DUAL PRICE
============================================================ */
.dp{display:flex;flex-direction:column;align-items:flex-end;gap:1px}
.dp-usd{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700}
.dp-brl{font-family:'JetBrains Mono',monospace;font-size:10px;color:#d97706}
.cell-brl{font-family:'JetBrains Mono',monospace;font-size:9px;color:#d97706;margin-top:1px}

/* ============================================================
   COUNTDOWN
============================================================ */
.hero{
  background:var(--gl);border:1px solid var(--ac-border);border-radius:14px;
  padding:18px 16px;margin-bottom:12px;position:relative;overflow:hidden;
  box-shadow:0 0 24px var(--ac-dim);
}
.hero::after{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse 55% 55% at 100% 0%,var(--ac-dim),transparent);
  pointer-events:none;
}
.hero-dest{font-size:9px;text-transform:uppercase;letter-spacing:.15em;color:var(--ac);margin-bottom:10px;display:flex;align-items:center;gap:7px;position:relative;z-index:1}
.cblocks{display:flex;gap:14px;position:relative;z-index:1}
.cblock{text-align:center}
.cn{font-family:'JetBrains Mono',monospace;font-size:36px;font-weight:700;line-height:1;color:var(--tx)}
.cl{font-size:8px;text-transform:uppercase;letter-spacing:.12em;color:var(--tx3);margin-top:3px}
@media(max-width:360px){.cn{font-size:28px}}

/* ============================================================
   PASSENGER CARD
============================================================ */
.pcard{
  background:var(--gl);border:1px solid var(--bd);border-radius:12px;
  padding:12px;display:flex;align-items:center;gap:10px;margin-bottom:9px;
}
.pav{width:42px;height:42px;border-radius:11px;font-size:20px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;border:2px solid transparent}
.pinfo{flex:1;min-width:0}
.pname{font-size:13px;font-weight:700}
.pbio{font-size:10px;color:var(--tx3);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pact{display:flex;gap:5px;flex-shrink:0}

/* ============================================================
   EMOJI & COLOR PICKERS
============================================================ */
.eg{display:grid;grid-template-columns:repeat(6,1fr);gap:5px;margin-bottom:12px}
.eo{width:100%;aspect-ratio:1;border-radius:8px;font-size:18px;border:1px solid transparent;background:var(--gl);cursor:pointer;transition:.15s;display:flex;align-items:center;justify-content:center}
.eo.on{background:var(--ac-dim);border-color:var(--ac-border);transform:scale(1.06)}
.cr{display:flex;gap:6px;flex-wrap:wrap}
.cd{width:24px;height:24px;border-radius:7px;cursor:pointer;border:2px solid transparent;transition:.15s}
.cd.on{border-color:#fff;transform:scale(1.18);box-shadow:0 0 7px currentColor}

/* ============================================================
   FINANCE
============================================================ */
.frow{padding:11px 13px;border-bottom:1px solid var(--bd);transition:.12s}
.frow:last-child{border-bottom:none}
.frow:active{background:rgba(255,255,255,.015)}
.ftop{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:7px}
.fcells{display:grid;grid-template-columns:1fr 1fr 1fr;gap:5px;margin-top:7px}
.fc{background:var(--bg3);border-radius:7px;padding:6px 7px;text-align:center;transition:.15s}
.fc:active{background:var(--gl2)}
.fc-lbl{font-size:8px;text-transform:uppercase;letter-spacing:.06em;color:var(--tx3);margin-bottom:2px}
.fc-val{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700}
.fc-edit{
  font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;
  background:var(--ac-dim);border:1px solid var(--ac-border);
  border-radius:5px;padding:2px 6px;color:var(--tx);outline:none;
  width:100%;text-align:center;
}

/* ============================================================
   SHOPPING
============================================================ */
.si{padding:11px 13px;border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:9px}
.si:last-child{border-bottom:none}
.sck{width:21px;height:21px;border-radius:50%;border:1.5px solid var(--bd);flex-shrink:0;cursor:pointer;transition:.18s;display:flex;align-items:center;justify-content:center;font-size:10px}
.sck.on{background:var(--ac);border-color:var(--ac);color:#000;box-shadow:0 0 8px var(--ac-glow)}
.si-info{flex:1;min-width:0}
.si-name{font-size:12px;font-weight:600}
.si-name.x{text-decoration:line-through;color:var(--tx3)}
.si-cat{font-size:9px;color:var(--tx3);margin-top:1px;text-transform:uppercase;letter-spacing:.05em}

/* ============================================================
   TICKET / TOGGLE
============================================================ */
.ti{padding:11px 13px;border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:9px}
.ti:last-child{border-bottom:none}
.tsw{width:36px;height:20px;border-radius:99px;border:1.5px solid var(--bd);background:var(--bg3);flex-shrink:0;cursor:pointer;transition:.25s;position:relative}
.tsw::after{content:'';position:absolute;top:2px;left:2px;width:12px;height:12px;border-radius:50%;background:var(--tx3);transition:.25s}
.tsw.on{background:var(--ac-dim);border-color:var(--ac)}
.tsw.on::after{left:18px;background:var(--ac);box-shadow:0 0 5px var(--ac)}
.ti-info{flex:1;min-width:0}
.ti-name{font-size:12px;font-weight:600}
.ti-link{font-size:9px;color:var(--ac);opacity:.7;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ti-st{font-size:8px;margin-top:2px;text-transform:uppercase;letter-spacing:.06em}

/* ============================================================
   DOCS
============================================================ */
.di{display:flex;align-items:center;gap:9px;padding:10px 13px;border-bottom:1px solid var(--bd)}
.di:last-child{border-bottom:none}
.dsw{width:34px;height:18px;border-radius:99px;border:1px solid var(--bd);background:var(--bg3);flex-shrink:0;cursor:pointer;transition:.25s;position:relative}
.dsw::after{content:'';position:absolute;top:2px;left:2px;width:10px;height:10px;border-radius:50%;background:var(--tx3);transition:.25s}
.dsw.on{background:var(--ac-dim);border-color:var(--ac)}
.dsw.on::after{left:18px;background:var(--ac)}
.di-name{flex:1;font-size:12px;font-weight:500}
.di-name.done{color:var(--tx3);text-decoration:line-through}
.udi{width:5px;height:5px;border-radius:50%;background:#e53e3e;flex-shrink:0;box-shadow:0 0 5px #e53e3e}

/* ============================================================
   ITINERARY
============================================================ */
.dc{background:var(--gl);border:1px solid var(--bd);border-radius:12px;overflow:hidden;margin-bottom:10px}
.dch{display:flex;align-items:center;justify-content:space-between;padding:9px 13px;border-bottom:1px solid var(--bd)}
.dnum{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;color:var(--ac);width:24px;height:24px;border-radius:6px;background:var(--ac-dim);border:1px solid var(--ac-border);display:flex;align-items:center;justify-content:center;transition:all .4s}
.per{padding:9px 13px;border-bottom:1px solid var(--bd)}
.per:last-child{border-bottom:none}
.per-l{font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;margin-bottom:6px}
.per-ta{background:var(--bg3);border:1px solid var(--bd);border-radius:7px;padding:7px 10px;color:var(--tx);font-
