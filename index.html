<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>TripOS — Planejador de Viagem</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════
   RESET & BASE
═══════════════════════════════════════════ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px;scroll-behavior:smooth}
body{
  font-family:'Space Grotesk',sans-serif;
  background:#06060e;
  color:#e8e8f0;
  min-height:100vh;
  overflow-x:hidden;
}
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#c0392b44;border-radius:99px}
input,textarea,select{font-family:'Space Grotesk',sans-serif;color-scheme:dark}
button{font-family:'Space Grotesk',sans-serif;cursor:pointer;border:none;background:none}
a{color:inherit;text-decoration:none}
.mono{font-family:'Space Mono',monospace}

/* ═══════════════════════════════════════════
   CSS VARIABLES
═══════════════════════════════════════════ */
:root{
  --bg:        #06060e;
  --bg2:       #0b0b16;
  --bg3:       #0f0f1c;
  --border:    rgba(255,255,255,0.07);
  --border2:   rgba(255,255,255,0.04);
  --text:      #e8e8f0;
  --text2:     #8888a8;
  --text3:     #44445a;
  --red:       #e53e3e;
  --red-dark:  #c53030;
  --red-dim:   rgba(229,62,62,0.12);
  --red-glow:  rgba(229,62,62,0.25);
  --green:     #38a169;
  --amber:     #d97706;
  --purple:    #7c3aed;
  --sidebar-w: 220px;
  --header-h:  56px;
}

/* ═══════════════════════════════════════════
   BACKGROUND EFFECTS
═══════════════════════════════════════════ */
body::before{
  content:'';
  position:fixed;inset:0;
  background-image:
    linear-gradient(rgba(229,62,62,0.025) 1px,transparent 1px),
    linear-gradient(90deg,rgba(229,62,62,0.025) 1px,transparent 1px);
  background-size:48px 48px;
  pointer-events:none;z-index:0;
}
body::after{
  content:'';
  position:fixed;
  top:-30%;right:-20%;
  width:600px;height:600px;
  background:radial-gradient(circle,rgba(229,62,62,0.04) 0%,transparent 65%);
  pointer-events:none;z-index:0;
}
#app{position:relative;z-index:1}

/* ═══════════════════════════════════════════
   LAYOUT
═══════════════════════════════════════════ */
#app{display:flex;min-height:100vh}

/* SIDEBAR */
#sidebar{
  width:var(--sidebar-w);
  background:linear-gradient(180deg,#090915 0%,#07070f 100%);
  border-right:1px solid var(--border);
  display:flex;flex-direction:column;
  position:fixed;top:0;left:0;bottom:0;
  z-index:100;overflow-y:auto;
  transition:transform .3s cubic-bezier(.4,0,.2,1);
}
#sidebar-overlay{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,.75);backdrop-filter:blur(4px);
  z-index:99;
}
@media(max-width:900px){
  #sidebar{transform:translateX(-100%)}
  #sidebar.open{transform:translateX(0)}
  #sidebar-overlay.show{display:block}
}

.sidebar-logo{
  padding:20px 18px 16px;
  border-bottom:1px solid var(--border2);
  display:flex;align-items:center;gap:12px;
}
.logo-icon{
  width:36px;height:36px;border-radius:10px;flex-shrink:0;
  background:linear-gradient(135deg,var(--red-dark),var(--red));
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 0 20px var(--red-glow);
  font-size:16px;
}
.logo-text{font-size:15px;font-weight:700;letter-spacing:-.3px}
.logo-sub{font-size:10px;color:var(--text3);margin-top:1px}

.sidebar-section{padding:14px 12px 6px;border-bottom:1px solid var(--border2)}
.sidebar-label{font-size:9px;text-transform:uppercase;letter-spacing:.12em;color:var(--text3);padding:0 6px;margin-bottom:8px}

.passenger-btn{
  display:flex;align-items:center;gap:10px;padding:9px 8px;
  border-radius:10px;width:100%;transition:.2s;
  font-size:13px;font-weight:500;color:var(--text2);
  border:1px solid transparent;
}
.passenger-btn:hover{background:rgba(255,255,255,0.04);color:var(--text)}
.passenger-btn.active{background:var(--red-dim);color:#fca5a5;border-color:rgba(229,62,62,0.25)}
.passenger-btn .dot{
  width:6px;height:6px;border-radius:50%;
  background:var(--red);margin-left:auto;flex-shrink:0;
  box-shadow:0 0 6px var(--red);
}

nav.sidebar-nav{padding:10px 12px;flex:1}
.nav-btn{
  display:flex;align-items:center;gap:10px;padding:10px 10px;
  border-radius:10px;width:100%;transition:.2s;
  font-size:13px;font-weight:500;color:var(--text3);
  border:1px solid transparent;margin-bottom:2px;
}
.nav-btn svg{flex-shrink:0;opacity:.6}
.nav-btn:hover{background:rgba(255,255,255,0.04);color:var(--text2)}
.nav-btn.active{background:var(--red-dim);color:#fca5a5;border-color:rgba(229,62,62,0.2)}
.nav-btn.active svg{opacity:1}

.sidebar-countdown{
  margin:12px;padding:14px;
  background:linear-gradient(135deg,rgba(229,62,62,0.08),rgba(197,48,48,0.04));
  border:1px solid rgba(229,62,62,0.15);border-radius:12px;text-align:center;
}
.countdown-num{font-family:'Space Mono',monospace;font-size:28px;font-weight:700;color:var(--red);line-height:1}
.countdown-label{font-size:9px;text-transform:uppercase;letter-spacing:.1em;color:var(--text3);margin-top:4px}

/* MAIN CONTENT */
#main{
  flex:1;
  margin-left:var(--sidebar-w);
  display:flex;flex-direction:column;min-height:100vh;
}
@media(max-width:900px){#main{margin-left:0}}

/* HEADER */
#header{
  height:var(--header-h);
  background:rgba(6,6,14,.9);
  backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 16px;gap:12px;
  position:sticky;top:0;z-index:50;
}
#menu-btn{
  width:36px;height:36px;border-radius:9px;
  background:rgba(255,255,255,0.05);
  border:1px solid var(--border);
  display:none;align-items:center;justify-content:center;
  color:var(--text2);transition:.2s;
}
#menu-btn:hover{background:rgba(255,255,255,0.08);color:var(--text)}
@media(max-width:900px){#menu-btn{display:flex}}
.header-title{font-size:14px;font-weight:600;flex:1}
.header-sub{font-size:10px;color:var(--text3);margin-top:1px}
.header-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.header-pill{
  display:flex;align-items:center;gap:6px;
  background:rgba(255,255,255,0.04);border:1px solid var(--border);
  border-radius:20px;padding:5px 12px;font-size:11px;color:var(--text2);
}
.header-pill svg{color:var(--red)}
.passenger-pills{display:flex;gap:6px}
.p-pill{
  width:30px;height:30px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;font-size:14px;
  border:2px solid var(--border);transition:.2s;cursor:pointer;
}
.p-pill.active{border-color:var(--red);box-shadow:0 0 10px var(--red-glow)}

/* PAGE */
#page{flex:1;padding:20px 16px;max-width:860px;margin:0 auto;width:100%}

/* ═══════════════════════════════════════════
   CARDS & COMPONENTS
═══════════════════════════════════════════ */
.card{
  background:linear-gradient(135deg,#0d0d1a 0%,#0a0a15 100%);
  border:1px solid var(--border);border-radius:16px;overflow:hidden;
}
.card-red{
  background:linear-gradient(135deg,#150a0a 0%,#0f0a14 100%);
  border:1px solid rgba(229,62,62,0.15);border-radius:16px;overflow:hidden;
}
.card-head{
  display:flex;align-items:center;justify-content:space-between;
  padding:16px 18px;border-bottom:1px solid var(--border2);gap:10px;
}
.card-title{font-size:13px;font-weight:600}
.card-body{padding:18px}

.badge{
  display:inline-flex;align-items:center;padding:2px 9px;
  border-radius:99px;font-size:10px;font-weight:600;letter-spacing:.04em;
}
.badge-red{background:var(--red-dim);color:#fca5a5;border:1px solid rgba(229,62,62,0.25)}
.badge-green{background:rgba(56,161,105,0.12);color:#86efac;border:1px solid rgba(56,161,105,0.25)}
.badge-amber{background:rgba(217,119,6,0.12);color:#fcd34d;border:1px solid rgba(217,119,6,0.25)}
.badge-gray{background:rgba(255,255,255,0.05);color:var(--text2);border:1px solid var(--border)}

.kpi-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:16px}
@media(min-width:580px){.kpi-grid{grid-template-columns:repeat(4,1fr)}}
.kpi{
  background:linear-gradient(135deg,#0d0d1a,#0a0a15);
  border:1px solid var(--border);border-radius:14px;padding:16px 14px;
}
.kpi-label{font-size:9px;text-transform:uppercase;letter-spacing:.1em;color:var(--text3);margin-bottom:8px;display:flex;align-items:center;justify-content:space-between}
.kpi-icon{
  width:26px;height:26px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:12px;
}
.kpi-val{font-family:'Space Mono',monospace;font-size:18px;font-weight:700;color:var(--text);line-height:1}
.kpi-sub{font-size:10px;color:var(--text3);margin-top:4px}

.bar-wrap{height:4px;background:rgba(255,255,255,0.07);border-radius:99px;overflow:hidden;width:100%}
.bar-fill{height:100%;border-radius:99px;transition:width .8s cubic-bezier(.4,0,.2,1)}

.divider{height:1px;background:var(--border2);margin:0 -18px}

/* FORMS */
.field-label{font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--text3);display:block;margin-bottom:6px}
.input{
  background:rgba(255,255,255,0.04);border:1px solid var(--border);
  border-radius:10px;padding:10px 14px;color:var(--text);font-size:13px;
  width:100%;outline:none;transition:.2s;resize:none;
}
.input:focus{border-color:rgba(229,62,62,0.4);background:rgba(229,62,62,0.04)}
.input::placeholder{color:var(--text3)}
.input-sm{padding:7px 12px;font-size:12px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}

.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:7px;
  border-radius:10px;font-size:13px;font-weight:600;
  padding:9px 18px;transition:.2s;cursor:pointer;
}
.btn-primary{
  background:linear-gradient(135deg,var(--red-dark),var(--red));
  border:1px solid rgba(229,62,62,0.4);color:#fff;
  box-shadow:0 2px 12px rgba(229,62,62,0.2);
}
.btn-primary:hover{filter:brightness(1.1);transform:translateY(-1px);box-shadow:0 4px 20px rgba(229,62,62,0.35)}
.btn-ghost{
  background:rgba(255,255,255,0.04);border:1px solid var(--border);
  color:var(--text2);
}
.btn-ghost:hover{background:rgba(255,255,255,0.08);color:var(--text)}
.btn-sm{padding:6px 12px;font-size:12px;border-radius:8px}
.btn-icon{
  width:32px;height:32px;border-radius:8px;padding:0;
  background:rgba(255,255,255,0.04);border:1px solid var(--border);
  color:var(--text3);
}
.btn-icon:hover{background:rgba(255,255,255,0.08);color:var(--text)}
.btn-icon.danger:hover{background:rgba(229,62,62,0.1);border-color:rgba(229,62,62,0.3);color:var(--red)}

/* CHIP SELECTORS */
.chip-row{display:flex;flex-wrap:wrap;gap:7px}
.chip{
  padding:5px 13px;border-radius:99px;font-size:11px;font-weight:600;
  border:1px solid var(--border);background:rgba(255,255,255,0.03);
  color:var(--text2);cursor:pointer;transition:.2s;
}
.chip:hover{background:rgba(255,255,255,0.07);color:var(--text)}
.chip.active{background:var(--red-dim);border-color:rgba(229,62,62,0.35);color:#fca5a5}

/* MODAL */
.modal-backdrop{
  position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(8px);
  z-index:200;display:none;align-items:flex-end;justify-content:center;
}
@media(min-width:640px){.modal-backdrop{align-items:center}}
.modal-backdrop.show{display:flex}
.modal{
  background:linear-gradient(160deg,#0f0f1e,#0a0a15);
  border:1px solid var(--border);
  border-radius:20px 20px 0 0;
  width:100%;max-width:480px;
  max-height:90vh;overflow-y:auto;
  box-shadow:0 -20px 60px rgba(0,0,0,.5),0 0 40px rgba(229,62,62,0.05);
}
@media(min-width:640px){.modal{border-radius:20px}}
.modal-head{
  display:flex;align-items:center;justify-content:space-between;
  padding:18px 20px;border-bottom:1px solid var(--border2);
  position:sticky;top:0;background:#0f0f1e;z-index:1;
}
.modal-title{font-size:14px;font-weight:700}
.modal-close{
  width:30px;height:30px;border-radius:8px;background:rgba(255,255,255,0.06);
  border:1px solid var(--border);color:var(--text2);
  display:flex;align-items:center;justify-content:center;
}
.modal-close:hover{background:rgba(255,255,255,0.1);color:var(--text)}
.modal-body{padding:20px}
.form-group{margin-bottom:14px}

/* ═══════════════════════════════════════════
   INLINE EDITING
═══════════════════════════════════════════ */
.editable{
  cursor:pointer;border-bottom:1px dashed transparent;
  transition:.2s;display:inline;
}
.editable:hover{border-bottom-color:var(--red);color:#fca5a5}
.editing-input{
  background:rgba(229,62,62,0.08);border:1px solid rgba(229,62,62,0.4);
  border-radius:6px;padding:2px 8px;color:var(--text);font-size:inherit;
  font-family:inherit;outline:none;min-width:60px;
}

/* ═══════════════════════════════════════════
   SPECIFIC PAGE STYLES
═══════════════════════════════════════════ */

/* Dashboard hero */
.countdown-hero{
  padding:24px 20px;
  background:linear-gradient(135deg,rgba(229,62,62,0.06) 0%,rgba(197,48,48,0.02) 100%);
  border:1px solid rgba(229,62,62,0.12);border-radius:16px;
  margin-bottom:16px;position:relative;overflow:hidden;
}
.countdown-hero::before{
  content:'';position:absolute;
  top:0;right:0;width:200px;height:200px;
  background:radial-gradient(circle at top right,rgba(229,62,62,0.08),transparent 65%);
  pointer-events:none;
}
.countdown-blocks{display:flex;gap:16px}
.cblock{text-align:center}
.cblock-num{font-family:'Space Mono',monospace;font-size:36px;font-weight:700;color:var(--text);line-height:1}
.cblock-lab{font-size:9px;text-transform:uppercase;letter-spacing:.12em;color:var(--text3);margin-top:4px}
@media(max-width:400px){.cblock-num{font-size:28px}}

/* Passenger card */
.p-card{
  background:linear-gradient(135deg,#0d0d1a,#0a0a15);
  border:1px solid var(--border);border-radius:14px;
  padding:16px;display:flex;align-items:center;gap:14px;
  transition:.2s;
}
.p-card:hover{border-color:rgba(255,255,255,0.12)}
.p-avatar{
  width:48px;height:48px;border-radius:14px;
  display:flex;align-items:center;justify-content:center;font-size:22px;
  flex-shrink:0;border:2px solid transparent;
}
.p-card-info{flex:1;min-width:0}
.p-card-name{font-size:14px;font-weight:600}
.p-card-bio{font-size:11px;color:var(--text3);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.p-card-actions{display:flex;gap:6px;flex-shrink:0}

/* Emoji picker */
.emoji-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:6px;margin-bottom:14px}
.emoji-opt{
  width:100%;aspect-ratio:1;border-radius:10px;font-size:18px;
  border:1px solid transparent;background:rgba(255,255,255,0.04);
  cursor:pointer;transition:.2s;display:flex;align-items:center;justify-content:center;
}
.emoji-opt:hover{background:rgba(255,255,255,0.08)}
.emoji-opt.active{background:var(--red-dim);border-color:rgba(229,62,62,0.4);transform:scale(1.1)}

/* Color picker */
.color-row{display:flex;gap:8px;flex-wrap:wrap}
.color-opt{
  width:28px;height:28px;border-radius:8px;cursor:pointer;
  border:2px solid transparent;transition:.2s;
}
.color-opt.active{border-color:#fff;transform:scale(1.15);box-shadow:0 0 8px currentColor}

/* Finance table */
.finance-row{
  padding:14px 16px;border-bottom:1px solid var(--border2);
  transition:.15s;
}
.finance-row:last-child{border-bottom:none}
.finance-row:hover{background:rgba(255,255,255,0.015)}
.finance-row-top{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:8px}
.finance-row-nums{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-top:8px}
.finance-num-cell{background:rgba(255,255,255,0.03);border-radius:8px;padding:7px 10px;text-align:center}
.finance-num-label{font-size:9px;text-transform:uppercase;letter-spacing:.08em;color:var(--text3);margin-bottom:3px}
.finance-num-val{font-family:'Space Mono',monospace;font-size:12px;font-weight:700}

/* Shopping item */
.shop-item{
  padding:14px 16px;border-bottom:1px solid var(--border2);
  display:flex;align-items:center;gap:12px;transition:.15s;
}
.shop-item:last-child{border-bottom:none}
.shop-item:hover{background:rgba(255,255,255,0.015)}
.shop-check{
  width:22px;height:22px;border-radius:50%;border:2px solid var(--border);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
  cursor:pointer;transition:.2s;font-size:10px;
}
.shop-check.done{background:var(--green);border-color:var(--green);color:#fff}
.shop-check:not(.done):hover{border-color:var(--green)}
.shop-item-info{flex:1;min-width:0}
.shop-item-name{font-size:13px;font-weight:500}
.shop-item-name.crossed{text-decoration:line-through;color:var(--text3)}
.shop-item-cat{font-size:10px;color:var(--text3);margin-top:2px}
.shop-item-price{text-align:right;flex-shrink:0}
.price-base{font-family:'Space Mono',monospace;font-size:11px;color:var(--text2)}
.price-tax{font-family:'Space Mono',monospace;font-size:13px;font-weight:700;color:var(--amber)}

/* Ticket item */
.ticket-item{
  padding:14px 16px;border-bottom:1px solid var(--border2);
  display:flex;align-items:center;gap:12px;transition:.15s;
}
.ticket-item:last-child{border-bottom:none}
.ticket-item:hover{background:rgba(255,255,255,0.015)}
.ticket-check{
  width:34px;height:34px;border-radius:10px;border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
  cursor:pointer;transition:.2s;font-size:14px;
}
.ticket-check.done{background:rgba(56,161,105,0.15);border-color:rgba(56,161,105,0.4);color:var(--green)}
.ticket-check:not(.done):hover{border-color:var(--green);color:var(--green)}
.ticket-info{flex:1;min-width:0}
.ticket-name{font-size:13px;font-weight:500}
.ticket-link{font-size:10px;color:var(--text3);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ticket-val{font-family:'Space Mono',monospace;font-size:13px;font-weight:700;flex-shrink:0;color:var(--text)}

/* Itinerary */
.day-card{
  background:linear-gradient(135deg,#0d0d1a,#0a0a15);
  border:1px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:12px;
}
.day-head{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 16px;border-bottom:1px solid var(--border2);
}
.day-num{
  width:28px;height:28px;border-radius:8px;background:var(--red-dim);
  border:1px solid rgba(229,62,62,0.25);display:flex;align-items:center;justify-content:center;
  font-family:'Space Mono',monospace;font-size:11px;font-weight:700;color:var(--red);
}
.period{padding:12px 16px;border-bottom:1px solid var(--border2)}
.period:last-child{border-bottom:none}
.period-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;margin-bottom:8px}
.period-input{
  background:rgba(255,255,255,0.03);border:1px solid var(--border2);
  border-radius:8px;padding:9px 12px;color:var(--text);font-size:12px;
  width:100%;outline:none;resize:none;transition:.2s;
  font-family:'Space Grotesk',sans-serif;
}
.period-input:focus{border-color:rgba(229,62,62,0.3);background:rgba(229,62,62,0.03)}
.period-input::placeholder{color:var(--text3)}

/* Docs */
.doc-item{
  display:flex;align-items:center;gap:12px;
  padding:12px 16px;border-bottom:1px solid var(--border2);transition:.15s;
}
.doc-item:last-child{border-bottom:none}
.doc-item:hover{background:rgba(255,255,255,0.015)}
.doc-chk{
  width:20px;height:20px;border-radius:5px;border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;cursor:pointer;
  flex-shrink:0;transition:.2s;font-size:10px;
}
.doc-chk.done{background:var(--green);border-color:var(--green);color:#fff}
.doc-name{flex:1;font-size:13px}
.doc-name.crossed{text-decoration:line-through;color:var(--text3)}
.urgent-dot{
  width:6px;height:6px;border-radius:50%;background:var(--red);
  flex-shrink:0;box-shadow:0 0 6px var(--red);
}

/* DEST destinations grid */
.dest-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}
@media(min-width:500px){.dest-grid{grid-template-columns:repeat(4,1fr)}}
.dest-btn{
  padding:10px;border-radius:12px;border:1px solid var(--border);
  background:rgba(255,255,255,0.03);cursor:pointer;transition:.2s;text-align:center;
}
.dest-btn:hover{background:rgba(255,255,255,0.06);border-color:rgba(255,255,255,0.12)}
.dest-btn.active{background:var(--red-dim);border-color:rgba(229,62,62,0.3)}
.dest-flag{font-size:20px;margin-bottom:4px}
.dest-name{font-size:11px;font-weight:600}
.dest-tz{font-size:9px;color:var(--text3);margin-top:1px}

/* UTIL */
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.section-title{font-size:13px;font-weight:700;display:flex;align-items:center;gap:8px}
.section-title svg{color:var(--red);opacity:.8}
.empty{padding:32px;text-align:center;color:var(--text3);font-size:13px}
.mt4{margin-top:4px}
.mt8{margin-top:8px}
.mt12{margin-top:12px}
.mt16{margin-top:16px}
.mb8{margin-bottom:8px}
.mb14{margin-bottom:14px}
.flex{display:flex}
.items-center{align-items:center}
.justify-between{justify-content:space-between}
.gap6{gap:6px}
.gap8{gap:8px}
.gap10{gap:10px}
.gap12{gap:12px}
.flex1{flex:1}
.w100{width:100%}
.text-red{color:var(--red)}
.text-green{color:var(--green)}
.text-amber{color:var(--amber)}
.text-dim{color:var(--text2)}
.text-xs{font-size:11px}
.text-xxs{font-size:9px}
.fw7{font-weight:700}

/* Consolidated banner */
.cons-banner{
  background:rgba(255,255,255,0.02);border:1px solid var(--border);
  border-radius:12px;padding:12px 16px;margin-bottom:14px;
  display:flex;flex-wrap:wrap;gap:12px;align-items:center;
}
.cons-banner svg{color:var(--text3)}
.cons-item{font-size:11px;color:var(--text2)}
.cons-item b{font-family:'Space Mono',monospace}

/* Tabs */
.cat-filter{display:flex;gap:7px;overflow-x:auto;padding-bottom:2px;margin-bottom:14px}
.cat-filter::-webkit-scrollbar{height:0}
.cat-chip{
  padding:5px 12px;border-radius:99px;font-size:11px;font-weight:600;
  border:1px solid var(--border);background:rgba(255,255,255,0.03);
  color:var(--text3);cursor:pointer;transition:.2s;white-space:nowrap;flex-shrink:0;
}
.cat-chip:hover{background:rgba(255,255,255,0.06);color:var(--text2)}
.cat-chip.active{background:var(--red-dim);border-color:rgba(229,62,62,0.3);color:#fca5a5}

/* Totals footer */
.totals-footer{
  padding:14px 16px;background:rgba(255,255,255,0.02);
  border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;
}

/* Urgency warning */
.urgent-warn{
  background:rgba(229,62,62,0.06);border:1px solid rgba(229,62,62,0.18);
  border-radius:12px;padding:12px 16px;margin-bottom:14px;
}
.urgent-warn-title{font-size:12px;font-weight:600;color:#fca5a5;display:flex;align-items:center;gap:6px;margin-bottom:8px}
.urgent-warn-item{font-size:12px;color:var(--text2);display:flex;align-items:center;gap:8px;padding:3px 0}

// ── Formatters ──────────────────────────────────────────
const SYMBOLS = { USD:'$', EUR:'€', BRL:'R$', GBP:'£', JPY:'¥' };
const fmt = (n, cur) => `${SYMBOLS[cur || state.trip.currency] || '$'}${Number(n||0).toFixed(2)}`;
const pct = (a,b) => b > 0 ? Math.min(100, Math.round(a/b*100)) : 0;
const bar = (val, max, color) => `<div class="bar-wrap"><div class="bar-fill" style="width:${pct(val,max)}%;background:${color||'var(--red)'}"></div></div>`;

// ── Helpers ──────────────────────────────────────────────
function activePassenger() {
  return state.passengers.find(p => p.id === state.activePid) || state.passengers[0];
}
function pFinances()  { return state.finances[state.activePid]  || []; }
function pShopping()  { return state.shopping[state.activePid]  || []; }
function pTickets()   { return state.tickets[state.activePid]   || []; }

// ── Countdown ────────────────────────────────────────────
let countdownInterval;
function startCountdown() {
  clearInterval(countdownInterval);
  countdownInterval = setInterval(updateCountdownUI, 1000);
  updateCountdownUI();
}
function getCountdown() {
  const ms = new Date(state.trip.date) - new Date();
  if (ms <= 0) return { d:0, h:0, m:0, s:0 };
  return {
    d: Math.floor(ms/86400000),
    h: Math.floor((ms%86400000)/3600000),
    m: Math.floor((ms%3600000)/60000),
    s: Math.floor((ms%60000)/1000),
  };
}
function updateCountdownUI() {
  const c = getCountdown();
  const el = document.getElementById('sb-countdown');
  const h  = document.getElementById('hdr-countdown');
  if (el) el.textContent = c.d;
  if (h)  h.textContent  = `${c.d}d ${c.h}h`;
}

// ══════════════════════════════════════════════════════
// NAVIGATION
// ══════════════════════════════════════════════════════
const TAB_LABELS = {
  dashboard:'Visão Geral', trip:'Destino', passengers:'Passageiros',
  finance:'Financeiro', itinerary:'Roteiro', shopping:'Compras',
  tickets:'Ingressos', docs:'Documentos'
};

function goTab(tab) {
  state.currentTab = tab;
  document.querySelectorAll('.nav-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.tab === tab);
  });
  document.getElementById('hdr-title').textContent = TAB_LABELS[tab];
  closeSidebar();
  renderPage();
}

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sidebar-overlay').classList.toggle('show');
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebar-overlay').classList.remove('show');
}

// ══════════════════════════════════════════════════════
// MODALS
// ══════════════════════════════════════════════════════
function openModal(id)  { document.getElementById(id).classList.add('show'); }
function closeModal(id) { document.getElementById(id).classList.remove('show'); }

// ══════════════════════════════════════════════════════
// RENDER SIDEBAR PASSENGERS
// ══════════════════════════════════════════════════════
function renderSidebar() {
  // dest
  document.getElementById('sb-dest-label').textContent =
    `${state.trip.flag} ${state.trip.destination}`;
  document.getElementById('hdr-sub').textContent =
    `${state.trip.flag} ${state.trip.destination} · ${new Date(state.trip.date).toLocaleDateString('pt-BR')}`;

  // sidebar passengers
  document.getElementById('sb-passengers').innerHTML = state.passengers.map(p => `
    <button class="passenger-btn ${p.id === state.activePid ? 'active' : ''}"
      onclick="setActivePassenger(${p.id})">
      <span style="font-size:16px">${p.emoji}</span>
      <span style="flex:1;text-align:left;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${p.name}</span>
      ${p.id === state.activePid ? '<span class="dot"></span>' : ''}
    </button>
  `).join('');

  // header passengers
  document.getElementById('hdr-passengers').innerHTML = state.passengers.map(p => `
    <div class="p-pill ${p.id === state.activePid ? 'active' : ''}"
      onclick="setActivePassenger(${p.id})"
      title="${p.name}">${p.emoji}</div>
  `).join('');
}

function setActivePassenger(id) {
  state.activePid = id;
  state.shopFilter = 'Todos';
  renderSidebar();
  renderPage();
}

// ══════════════════════════════════════════════════════
// PAGES
// ══════════════════════════════════════════════════════
function renderPage() {
  const pg = document.getElementById('page');
  const tab = state.currentTab;
  if (tab === 'dashboard')  pg.innerHTML = renderDashboard();
  else if (tab === 'trip')  pg.innerHTML = renderTrip();
  else if (tab === 'passengers') pg.innerHTML = renderPassengers();
  else if (tab === 'finance')    pg.innerHTML = renderFinance();
  else if (tab === 'itinerary')  pg.innerHTML = renderItinerary();
  else if (tab === 'shopping')   pg.innerHTML = renderShopping();
  else if (tab === 'tickets')    pg.innerHTML = renderTickets();
  else if (tab === 'docs')       pg.innerHTML = renderDocs();
  attachPageEvents();
}

// ── DASHBOARD ────────────────────────────────────────
function renderDashboard() {
  const c = getCountdown();
  const allF = Object.values(state.finances).flat();
  const consT = allF.reduce((a,f)=>a+f.target,0);
  const consS = allF.reduce((a,f)=>a+f.saved,0);
  const allSh = Object.values(state.shopping).flat();
  const shopT = withTax(allSh.reduce((a,s)=>a+s.priceUSD,0));
  const allTx = Object.values(state.tickets).flat();
  const tixT  = allTx.reduce((a,t)=>a+t.value,0);

  const urgentPending = state.docs.filter(d => d.urgent && !d.checked);

  return `
  <!-- Countdown -->
  <div class="countdown-hero">
    <div style="font-size:10px;text-transform:uppercase;letter-spacing:.12em;color:var(--red);margin-bottom:12px;display:flex;align-items:center;gap:8px">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.99 12a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.9 1.27h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9a16 16 0 0 0 6.91 6.91l1.09-1.1a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
      Partida para ${state.trip.destination}
    </div>
    <div class="countdown-blocks">
      ${[{v:c.d,l:'Dias'},{v:c.h,l:'Horas'},{v:c.m,l:'Min'},{v:c.s,l:'Seg'}].map(({v,l})=>`
        <div class="cblock">
          <div class="cblock-num">${String(v).padStart(2,'0')}</div>
          <div class="cblock-lab">${l}</div>
        </div>
      `).join('')}
    </div>
  </div>

  <!-- KPIs -->
  <div class="kpi-grid">
    ${[
      {l:'Orçamento',v:fmt(state.trip.budget),sub:'meta global',color:'#e53e3e',bg:'rgba(229,62,62,.12)',icon:'◎'},
      {l:'Arrecadado',v:fmt(consS),sub:`de ${fmt(consT)}`,color:'#38a169',bg:'rgba(56,161,105,.1)',icon:'↑'},
      {l:'Compras',v:fmt(shopT),sub:'c/ taxa local',color:'#d97706',bg:'rgba(217,119,6,.1)',icon:'🛍'},
      {l:'Ingressos',v:fmt(tixT),sub:`${allTx.length} eventos`,color:'#805ad5',bg:'rgba(128,90,213,.1)',icon:'🎟'},
    ].map(k=>`
      <div class="kpi">
        <div class="kpi-label">${k.l}
          <div class="kpi-icon" style="background:${k.bg};color:${k.color}">${k.icon}</div>
        </div>
        <div class="kpi-val" style="color:${k.color}">${k.v}</div>
        <div class="kpi-sub">${k.sub}</div>
      </div>
    `).join('')}
  </div>

  <!-- Per passenger -->
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px">
    ${state.passengers.map(p => {
      const pF = state.finances[p.id]||[];
      const pT = pF.reduce((a,f)=>a+f.target,0);
      const pS = pF.reduce((a,f)=>a+f.saved,0);
      const pSh= withTax((state.shopping[p.id]||[]).reduce((a,s)=>a+s.priceUSD,0));
      return `
      <div class="card" style="padding:14px">
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">
          <div style="width:36px;height:36px;border-radius:10px;background:${p.color}22;border:1.5px solid ${p.color}44;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0">${p.emoji}</div>
          <div style="flex:1;min-width:0">
            <div style="font-size:12px;font-weight:600">${p.name}</div>
            <div style="font-size:10px;color:var(--text3)">${p.bio||'Viajante'}</div>
          </div>
          <div class="mono" style="font-size:14px;font-weight:700;color:${p.color}">${pct(pS,pT)}%</div>
        </div>
        ${bar(pS,pT,p.color)}
        <div class="grid3 mt8">
          ${[{l:'Meta',v:fmt(pT)},{l:'Guardado',v:fmt(pS)},{l:'Compras',v:fmt(pSh)}].map(x=>`
            <div style="background:rgba(255,255,255,0.025);border-radius:7px;padding:6px 4px;text-align:center">
              <div class="mono" style="font-size:10px;font-weight:700">${x.v}</div>
              <div style="font-size:8px;color:var(--text3);margin-top:2px">${x.l}</div>
            </div>
          `).join('')}
        </div>
      </div>`;
    }).join('')}
  </div>

  ${urgentPending.length > 0 ? `
  <div class="urgent-warn">
    <div class="urgent-warn-title">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      Pendências urgentes
    </div>
    ${urgentPending.map(d=>`
      <div class="urgent-warn-item">
        <div class="urgent-dot"></div>${d.name}
      </div>
    `).join('')}
  </div>` : ''}
  `;
}

  const p = activePassenger();

  const totalT = rows.reduce((a,r)=>a+r.target,0);
  const totalS = rows.reduce((a,r)=>a+r.saved,0);
  const allF = Object.values(state.finances).flat();
  const consT = allF.reduce((a,f)=>a+f.target,0);
  const consS = allF.reduce((a,f)=>a+f.saved,0);

  return `
  <div style="max-width:720px;margin:0 auto">
    <div class="cons-banner">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
      <span class="cons-item">Total: <b style="color:var(--text)">${fmt(consT)}</b></span>

      <span class="cons-item">Falta: <b class="text-red">${fmt(Math.max(0,consT-consS))}</b></span>

    <div class="card">
      <div class="card-head">
        <div style="display:flex;align-items:center;gap:10px">

            <div style="font-size:10px;color:var(--text3)">${rows.length} itens</div>

        </div>
        <button class="btn btn-primary btn-sm" onclick="openModal('modal-finance');buildFinanceCatChips()">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>

      ${rows.length === 0 ? '<div class="empty">Nenhuma meta. Adicione acima ↑</div>' : `

        ${rows.map(r => {
          const falta = Math.max(0, r.target - r.saved);

          <div class="finance-row">
            <div class="finance-row-top">
              <div style="flex:1;min-width:0">

              <button class="btn-icon danger" onclick="removeFinance(${r.id})">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6M9 6V4h6v2"/></svg>
              </button>
            </div>
            ${bar(r.saved, r.target, p.color)}
            <div class="finance-row-nums mt8">
              <div class="finance-num-cell">
                <div class="finance-num-label">Alvo</div>
                <div class="finance-num-val">${fmt(r.target)}</div>
              </div>
              <div class="finance-num-cell">
                <div class="finance-num-label">Guardado</div>
                <div class="finance-num-val text-green">${fmt(r.saved)}</div>
              </div>
              <div class="finance-num-cell" style="${falta===0?'background:rgba(56,161,105,0.08)':'background:rgba(229,62,62,0.05)'}">
                <div class="finance-num-label">Falta</div>
                <div class="finance-num-val ${falta>0?'text-red':'text-green'}">${falta>0?fmt(falta):'✓'}</div>

      <div class="totals-footer">
        <span style="font-size:11px;color:var(--text3)">Total ${p.name}</span>
        <div style="display:flex;gap:14px">
          <span class="mono" style="font-size:12px">${fmt(totalT)}</span>

  // categories present
  const cats = ['Todos',...new Set(items.map(i=>i.category))];
  const filtered = state.shopFilter === 'Todos' ? items : items.filter(i=>i.category === state.shopFilter);

  const subtotal = items.reduce((a,i)=>a+i.priceUSD,0);
  const tax      = subtotal * NYC_TAX;

  return `
  <div style="max-width:600px;margin:0 auto">
    <div class="cons-banner">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
      <span class="cons-item">Todos c/ taxa: <b class="text-amber">${fmt(consTotal)}</b></span>
      <span class="cons-item" style="color:var(--text3);font-size:10px">Taxa NYC: 8.875%</span>
    </div>

    <div class="card">
      <div class="card-head">
        <div style="display:flex;align-items:center;gap:10px">
          <span style="font-size:20px">${p.emoji}</span>
          <div>
            <div class="card-title">${p.name} — Compras</div>
            <div style="font-size:10px;color:var(--text3)">${items.length} itens</div>
          </div>
        </div>
        <button class="btn btn-primary btn-sm" onclick="openModal('modal-shopping');buildShopCatChips()">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Item
        </button>
      </div>

      ${cats.length > 2 ? `
      <div style="padding:10px 16px 0;border-bottom:1px solid var(--border2)">
        <div class="cat-filter">
          ${cats.map(c=>`<span class="cat-chip ${state.shopFilter===c?'active':''}" onclick="setShopFilter('${c}')">${c}</span>`).join('')}
        </div>
      </div>` : ''}

      ${filtered.length === 0 ? '<div class="empty">Nenhum item encontrado.</div>' : `
      <div>
        ${filtered.map(item => `
          <div class="shop-item">
            <div class="shop-check ${item.bought?'done':''}" onclick="toggleShopItem(${item.id})">
              ${item.bought?'✓':''}
            </div>
            <div class="shop-item-info">
              <div class="shop-item-name ${item.bought?'crossed':''}">${item.name}</div>
              <div class="shop-item-cat"><span class="badge badge-gray" style="font-size:9px">${item.category}</span></div>
            </div>
            <div class="shop-item-price">
              <div class="price-base">${fmt(item.priceUSD)} + tax</div>
              <div class="price-tax">${fmt(withTax(item.priceUSD))}</div>
            </div>
            <button class="btn-icon danger" onclick="removeShopItem(${item.id})" style="flex-shrink:0">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg>
            </button>
          </div>
        `).join('')}
      </div>
      <div class="totals-footer" style="flex-direction:column;align-items:stretch;gap:6px">
        ${[{l:'Subtotal',v:fmt(subtotal),c:''},{l:'Taxa NYC (8.875%)',v:fmt(tax),c:'text-dim'},{l:'TOTAL c/ Impostos',v:fmt(subtotal+tax),c:'text-amber fw7'}].map(x=>`
          <div style="display:flex;justify-content:space-between;font-size:12px">
            <span style="color:var(--text2)">${x.l}</span>
            <span class="mono ${x.c}">${x.v}</span>
          </div>
        `).join('')}
      </div>
      `}
    </div>
  </div>`;
}

// ── TICKETS ──────────────────────────────────────────
function renderTickets() {
  const p = activePassenger();
  const items = pTickets();
  const allTx = Object.values(state.tickets).flat();
  const consTotal = allTx.reduce((a,t)=>a+t.value,0);
  const total = items.reduce((a,t)=>a+t.value,0);
  const bought = items.filter(t=>t.bought).length;

  return `
  <div style="max-width:600px;margin:0 auto">
    <div class="cons-banner">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
      <span class="cons-item">Total consolidado: <b class="mono text-amber">${fmt(consTotal)}</b></span>
    </div>

    <div class="card">
      <div class="card-head">
        <div style="display:flex;align-items:center;gap:10px">
          <span style="font-size:20px">${p.emoji}</span>
          <div>
            <div class="card-title">${p.name} — Ingressos</div>
            <div style="font-size:10px;color:var(--text3)">${bought}/${items.length} confirmados</div>
          </div>
        </div>
        <button class="btn btn-primary btn-sm" onclick="openModal('modal-ticket')">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Ingresso
        </button>
      </div>

      ${items.length === 0 ? '<div class="empty">Nenhum ingresso.</div>' : `
      <div>
        ${items.map(item => `
          <div class="ticket-item">
            <div class="ticket-check ${item.bought?'done':''}" onclick="toggleTicket(${item.id})" title="Marcar como comprado">
              ✓
            </div>
            <div class="ticket-info">
              <div class="ticket-name" style="${item.bought?'text-decoration:line-through;color:var(--text3)':''}">${item.event}</div>
              ${item.link ? `<div class="ticket-link">
                <a href="${item.link}" target="_blank" style="color:var(--red);opacity:.7;display:flex;align-items:center;gap:4px">
                  <svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
                  Link
                </a>
              </div>` : ''}
              <span class="badge ${item.bought?'badge-green':'badge-gray'}" style="margin-top:4px">${item.bought?'Comprado':'Pendente'}</span>
            </div>
            <div class="ticket-val">${fmt(item.value)}</div>
            <button class="btn-icon danger" onclick="removeTicket(${item.id})">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg>
            </button>
          </div>
        `).join('')}
      </div>
      <div class="totals-footer">
        <span style="font-size:11px;color:var(--text3)">${bought}/${items.length} confirmados</span>
        <span class="mono" style="font-weight:700">${fmt(total)}</span>
      </div>
      `}
    </div>
  </div>`;
}

// ── DOCS ─────────────────────────────────────────────
function renderDocs() {
  const done = state.docs.filter(d=>d.checked).length;
  return `
  <div style="max-width:480px;margin:0 auto">
    <div class="card">
      <div class="card-head">
        <div>
          <div class="card-title">📋 Checklist de Documentos</div>
          <div style="font-size:10px;color:var(--text3);margin-top:3px">${done}/${state.docs.length} concluídos</div>
        </div>
        <button class="btn btn-primary btn-sm" onclick="openModal('modal-doc')">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Item
        </button>
      </div>
      <div style="padding:4px 16px 8px">
        ${bar(done, state.docs.length, '#38a169')}
      </div>
      <div>
        ${state.docs.map(doc => `
          <div class="doc-item">
            <div class="doc-chk ${doc.checked?'done':''}" onclick="toggleDoc(${doc.id})">
              ${doc.checked?'✓':''}
            </div>
            <div class="doc-name ${doc.checked?'crossed':''}" style="flex:1">${doc.name}</div>
            ${doc.urgent && !doc.checked ? '<div class="urgent-dot" title="Urgente"></div>' : ''}
            <button class="btn-icon danger" onclick="removeDoc(${doc.id})">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg>
            </button>
          </div>
        `).join('')}
      </div>
    </div>
  </div>`;
}

// ══════════════════════════════════════════════════════
// PASSENGER CRUD
// ══════════════════════════════════════════════════════
function buildPassengerModal() {
  // emoji picker
  document.getElementById('emoji-picker').innerHTML = EMOJIS.map(e => `
    <button class="emoji-opt ${state.pForm.emoji===e?'active':''}"
      onclick="selectEmoji('${e}')">${e}</button>
  `).join('');
  // color picker
  document.getElementById('color-picker').innerHTML = COLORS.map(c => `
    <div class="color-opt ${state.pForm.color===c?'active':''}"
      style="background:${c}" onclick="selectColor('${c}')"></div>
  `).join('');
}

function selectEmoji(e) {
  state.pForm.emoji = e;
  document.querySelectorAll('.emoji-opt').forEach(el => el.classList.toggle('active', el.textContent.trim()===e));
}
function selectColor(c) {
  state.pForm.color = c;
  document.querySelectorAll('.color-opt').forEach(el => el.classList.toggle('active', el.style.background===c || el.style.backgroundColor === c));
}

function openNewPassengerModal() {
  state.editingPassengerId = null;
  state.pForm = { emoji:'🧑', color:'#e53e3e', name:'', bio:'' };
  document.getElementById('pmodal-title').textContent = 'Novo Passageiro';
  document.getElementById('pmodal-save-btn').textContent = 'Adicionar';
  document.getElementById('p-name').value = '';
  document.getElementById('p-bio').value = '';
  buildPassengerModal();
  openModal('modal-passenger');
}

function openEditPassengerModal(id) {
  const p = state.passengers.find(x=>x.id===id);
  if (!p) return;
  state.editingPassengerId = id;
  state.pForm = { emoji:p.emoji, color:p.color, name:p.name, bio:p.bio||'' };
  document.getElementById('pmodal-title').textContent = 'Editar Perfil';
  document.getElementById('pmodal-save-btn').textContent = 'Salvar';
  document.getElementById('p-name').value = p.name;
  document.getElementById('p-bio').value = p.bio||'';
  buildPassengerModal();
  openModal('modal-passenger');
}

function savePassenger() {
  const name = document.getElementById('p-name').value.trim();
  const bio  = document.getElementById('p-bio').value.trim();
  if (!name) return alert('Digite um nome.');
  if (state.editingPassengerId) {
    state.passengers = state.passengers.map(p =>
      p.id === state.editingPassengerId ? {...p, name, bio, emoji:state.pForm.emoji, color:state.pForm.color} : p
    );
  } else {
    const id = mkId();
    state.passengers.push({ id, name, bio, emoji:state.pForm.emoji, color:state.pForm.color });
    state.finances[id]  = [];
    state.shopping[id]  = [];
    state.tickets[id]   = [];
  }
  closeModal('modal-passenger');
  renderSidebar();
  renderPage();
}

function removePassenger(id) {
  if (state.passengers.length <= 1) return alert('A viagem precisa de pelo menos 1 passageiro.');
  if (!confirm('Remover este passageiro e todos seus dados?')) return;
  state.passengers = state.passengers.filter(p=>p.id!==id);
  delete state.finances[id];
  delete state.shopping[id];
  delete state.tickets[id];
  if (state.activePid === id) state.activePid = state.passengers[0].id;
  renderSidebar();
  renderPage();
}

// ══════════════════════════════════════════════════════
// FINANCE CRUD
// ══════════════════════════════════════════════════════
function buildFinanceCatChips() {
  document.getElementById('f-cat-chips').innerHTML = FIN_CATS.map(c=>`
    <span class="chip ${state.fCat===c?'active':''}" onclick="selectFCat('${c}')">${c}</span>
  `).join('');
}
function selectFCat(c) {
  state.fCat = c;
  document.querySelectorAll('#f-cat-chips .chip').forEach(el => el.classList.toggle('active', el.textContent===c));
}
function saveFinance() {
  const item   = document.getElementById('f-item').value.trim();
  const target = parseFloat(document.getElementById('f-target').value)||0;
  const saved  = parseFloat(document.getElementById('f-saved').value)||0;
  if (!item) return alert('Digite um item.');
  if (!state.finances[state.activePid]) state.finances[state.activePid] = [];
  state.finances[state.activePid].push({ id:mkId(), item, target, saved, category:state.fCat });
  ['f-item','f-target','f-saved'].forEach(id => document.getElementById(id).value='');
  closeModal('modal-finance');
  renderPage();
}
function removeFinance(id) {
  state.finances[state.activePid] = state.finances[state.activePid].filter(r=>r.id!==id);
  renderPage();
}

// ══════════════════════════════════════════════════════
// ITINERARY CRUD
// ══════════════════════════════════════════════════════
function addItineraryDay() {
  const days = Object.keys(state.itinerary).map(Number);
  const next = days.length ? Math.max(...days)+1 : 1;
  state.itinerary[next] = { morning:'', afternoon:'', evening:'' };
  renderPage();
}
function removeItineraryDay(day) {
  delete state.itinerary[day];
  renderPage();
}
function updateItinerary(day, period, val) {
  if (!state.itinerary[day]) state.itinerary[day] = {};
  state.itinerary[day][period] = val;
}

// ══════════════════════════════════════════════════════
// SHOPPING CRUD
// ══════════════════════════════════════════════════════
function buildShopCatChips() {
  document.getElementById('s-cat-chips').innerHTML = SHOP_CATS.map(c=>`
    <span class="chip ${state.sCat===c?'active':''}" onclick="selectSCat('${c}')">${c}</span>
  `).join('');
}
function selectSCat(c) {
  state.sCat = c;
  document.querySelectorAll('#s-cat-chips .chip').forEach(el => el.classList.toggle('active', el.textContent===c));
}
function saveShopping() {
  const name     = document.getElementById('s-name').value.trim();
  const priceUSD = parseFloat(document.getElementById('s-price').value)||0;
  if (!name) return alert('Digite o nome do item.');
  if (!state.shopping[state.activePid]) state.shopping[state.activePid] = [];
  state.shopping[state.activePid].push({ id:mkId(), name, priceUSD, bought:false, category:state.sCat });
  ['s-name','s-price'].forEach(id => document.getElementById(id).value='');
  closeModal('modal-shopping');
  renderPage();
}
function toggleShopItem(id) {
  state.shopping[state.activePid] = state.shopping[state.activePid].map(i => i.id===id ? {...i,bought:!i.bought} : i);
  renderPage();
}
function removeShopItem(id) {
  state.shopping[state.activePid] = state.shopping[state.activePid].filter(i=>i.id!==id);
  renderPage();
}
function setShopFilter(cat) {
  state.shopFilter = cat;
  renderPage();
}

// ══════════════════════════════════════════════════════
// TICKETS CRUD
// ══════════════════════════════════════════════════════
function saveTicket() {
  const event = document.getElementById('t-event').value.trim();
  const link  = document.getElementById('t-link').value.trim();
  const value = parseFloat(document.getElementById('t-value').value)||0;
  if (!event) return alert('Digite o nome do evento.');
  if (!state.tickets[state.activePid]) state.tickets[state.activePid] = [];
  state.tickets[state.activePid].push({ id:mkId(), event, link, value, bought:false });
  ['t-event','t-link','t-value'].forEach(id => document.getElementById(id).value='');
  closeModal('modal-ticket');
  renderPage();
}
function toggleTicket(id) {
  state.tickets[state.activePid] = state.tickets[state.activePid].map(t => t.id===id ? {...t,bought:!t.bought} : t);
  renderPage();
}
function removeTicket(id) {
  state.tickets[state.activePid] = state.tickets[state.activePid].filter(t=>t.id!==id);
  renderPage();
}

// ══════════════════════════════════════════════════════
// DOCS CRUD
// ══════════════════════════════════════════════════════
function saveDoc() {
  const name   = document.getElementById('d-name').value.trim();
  const urgent = document.getElementById('d-urgent').checked;
  if (!name) return alert('Digite o nome do documento.');
  state.docs.push({ id:mkId(), name, checked:false, urgent });
  document.getElementById('d-name').value = '';
  document.getElementById('d-urgent').checked = false;
  closeModal('modal-doc');
  renderPage();
}
function toggleDoc(id) {
  state.docs = state.docs.map(d => d.id===id ? {...d,checked:!d.checked} : d);
  renderPage();
}
function removeDoc(id) {
  state.docs = state.docs.filter(d=>d.id!==id);
  renderPage();
}

// ══════════════════════════════════════════════════════
// PAGE EVENTS (called after each renderPage)
// ══════════════════════════════════════════════════════
function attachPageEvents() {
  // Nothing needed — all events are inline onclick
}

// ══════════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════════
function init() {
  renderSidebar();
  renderPage();
  startCountdown();
}
init();
</script>
</body>
</html>
